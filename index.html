<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Mosaic Elite Health</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Mosaic Brand Bible v1.0 — May 2026 */
    :root {
      --flame: #FF6B00;
      --deep-red: #E83000;
      --crimson: #C41010;
      --amber: #FFB347;
      --cream: #FFF3E8;
      --peach: #FFE8D0;
      --dark: #1A0A00;
      --off-white: #FFFAF5;
      --gradient: linear-gradient(135deg, #FF6B00 0%, #E83000 55%, #C41010 100%);
      --gradient-soft: linear-gradient(135deg, #FFE8D0 0%, #FFF3E8 100%);
      --shadow-warm: 0 4px 20px rgba(232, 48, 0, 0.18);
      --shadow-card: 0 2px 12px rgba(26, 10, 0, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: var(--off-white); color: var(--dark); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    input, textarea { font-size: 16px; font-family: inherit; } /* iOS no-zoom */

    /* ── Animation tokens ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.92); }
      60%  { opacity: 1; transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* Page transitions */
    .route-enter { animation: fadeUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }

    /* Button press feedback — global, applies to every button */
    button { transition: transform 0.12s cubic-bezier(0.22,1,0.36,1), box-shadow 0.15s, filter 0.15s; will-change: transform; }
    button:not(:disabled):active { transform: scale(0.96); filter: brightness(0.95); }
    .btn { transition: transform 0.12s cubic-bezier(0.22,1,0.36,1), box-shadow 0.15s, filter 0.15s; }
    .btn:active { transform: scale(0.96); filter: brightness(0.95); }

    /* Card hover (subtle on touch) */
    .card { transition: transform 0.15s, box-shadow 0.2s; }
    .card:active { transform: scale(0.99); }

    /* Mosaic typography helpers */
    .lilita { font-family: 'Lilita One', system-ui, sans-serif; letter-spacing: 0.01em; }
    .bebas { font-family: 'Bebas Neue', system-ui, sans-serif; letter-spacing: 0.06em; }
    .label-cap { font-family: 'Inter Tight', system-ui, sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ============================================================

    const STORAGE_BOOKINGS = "mosaic_bookings_v2";
    const STORAGE_STARTED  = "mosaic_started_v1";

    const STORAGE_REQUESTS = "mosaic_service_requests_v1";
    const STORAGE_SMS = "mosaic_sms_queue_v1";
    const STORAGE_CHAT = "mosaic_chat_v1";
    const LATE_CANCEL_CUTOFF_DAYS = 4; // org_settings.late_cancel_cutoff_days

    // 3-hour blocks. Spec: 9-12, 12-3, 3-6, 6-9
    const BLOCKS = [
      { id: 1, label: "9am – 12pm" },

    // Activities — keep emojis and colors per owner direction.

      { id: 5,  emoji: "💆", name: "Beauty Therapy",    days: [5],    start_block: 1, end_block: 1, time: "11:00am",    category: "Self-Care",               color: "#E91E8C", mode: "program", location: "Lakes", practitioner_led: true },
      { id: 7,  emoji: "🔨", name: "Odd Jobs",          days: [2],    start_block: 1, end_block: 2, time: "9am – 3pm",  category: "Life Skills",             color: "#F39C12", mode: "program", location: "Lakes" },

      // ===== Monday =====
      { id: 8,  emoji: "🎵", name: "Music",                            days: [1],    start_block: 1, end_block: 2, time: "9am – 3pm", category: "Creative Expression", color: "#8E44AD", mode: "program", location: "Lakes" },
      { id: 9,  emoji: "🖌️", name: "Art",                              days: [1],    start_block: 1, end_block: 2, time: "9am – 3pm", category: "Creative Expression", color: "#E74C3C", mode: "program", location: "Lakes" },
      { id: 10, emoji: "💻", name: "Digital Design",                   days: [1, 4], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Capacity Building",   color: "#16A085", mode: "program", location: "Lakes" },
      { id: 11, emoji: "🔧", name: "Mechanics, Metal Work & Woodwork", days: [1],    start_block: 1, end_block: 2, time: "9am – 3pm", category: "Life Skills",         color: "#7F8C8D", mode: "program", location: "Bairnsdale" },

      // ===== Tuesday =====
      { id: 12, emoji: "🎲", name: "Indoor Games",             days: [2], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Social Connection",       color: "#2980B9", mode: "program", location: "Bairnsdale" },
      { id: 13, emoji: "🌱", name: "Garden Club",              days: [2], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Capacity Building",       color: "#27AE60", mode: "program", location: "Bairnsdale" },
      { id: 14, emoji: "🚐", name: "Exploring East Gippsland", days: [2], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Community Participation", color: "#D35400", mode: "program", location: "Bairnsdale" },

      // ===== Wednesday (Lakes only) =====
      { id: 15, emoji: "🏊", name: "Swimming (Aqua Dome)", days: [3], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Fitness & Wellbeing", color: "#3498DB", mode: "program", location: "Lakes" },
      { id: 16, emoji: "🏉", name: "Footy",                days: [3], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Fitness & Wellbeing", color: "#C0392B", mode: "program", location: "Lakes" },
      { id: 17, emoji: "🏠", name: "In-House Activities",  days: [3], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Social Connection",   color: "#E67E22", mode: "program", location: "Lakes" },

      // ===== Thursday =====
      { id: 18, emoji: "⛳", name: "Mini Golf", days: [4], start_block: 2, end_block: 2, time: "12pm – 3pm", category: "Community Participation", color: "#2ECC71", mode: "program", location: "Lakes" },

      // ===== Friday =====
      { id: 19, emoji: "🎳", name: "Bowling",     days: [5], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Community Participation", color: "#8E44AD", mode: "program", location: "Sale" },
      { id: 20, emoji: "🌟", name: "Free Choice", days: [5], start_block: 1, end_block: 2, time: "9am – 3pm", category: "Community Participation", color: "#F1C40F", mode: "program", location: "Lakes" },

      // ===== One-on-one =====
      { id: 101, emoji: "🚗", name: "Community Outing",                 days: [1,2,3,4,5], start_block: 1, end_block: 1, time: "9am – 12pm", category: "1:1 Support", color: "#3F51B5", mode: "one_on_one" },
      { id: 102, emoji: "🛒", name: "Shopping Support",                 days: [1,2,3,4,5], start_block: 2, end_block: 2, time: "12pm – 3pm", category: "1:1 Support", color: "#009688", mode: "one_on_one" },
      { id: 103, emoji: "🏋️", name: "Skill Building & Resume Writing", days: [1,2,3,4,5], start_block: 3, end_block: 3, time: "3pm – 6pm",  category: "1:1 Support", color: "#795548", mode: "one_on_one" },
    ];

    const DAY_NAMES = ["Mon", "Tue", "Wed", "Thu", "Fri"];
    const DAY_FULL  = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
    // TODO(owner): spec says Mon–Sun. Prototype is Mon–Fri. Extend if/when owner OKs design change.

    // TODO(owner): wire participant mode from auth. Default 'both' for prototype so tabs show.
    const CURRENT_PARTICIPANT_MODE = "both";

    // ============================================================
    // STORAGE HELPERS
    // ============================================================
    const safeParse = (s, fb) => { try { return JSON.parse(s) ?? fb; } catch { return fb; } };
    const loadBookings = () => safeParse(localStorage.getItem(STORAGE_BOOKINGS), {});
    const saveBookings = (b) => { try { localStorage.setItem(STORAGE_BOOKINGS, JSON.stringify(b)); } catch {} };
    const loadProfile  = () => safeParse(localStorage.getItem(STORAGE_PROFILE), { dislikes: "", allergies: "", regulators: "", background: "" });
    const saveProfile  = (p) => { try { localStorage.setItem(STORAGE_PROFILE, JSON.stringify(p)); } catch {} };
    const loadRequests = () => safeParse(localStorage.getItem(STORAGE_REQUESTS), []);
    const saveRequests = (r) => { try { localStorage.setItem(STORAGE_REQUESTS, JSON.stringify(r)); } catch {} };
    const loadSms      = () => safeParse(localStorage.getItem(STORAGE_SMS), []);
    const saveSms      = (m) => { try { localStorage.setItem(STORAGE_SMS, JSON.stringify(m)); } catch {} };
    const loadChat     = () => safeParse(localStorage.getItem(STORAGE_CHAT), null);
    const saveChat     = (m) => { try { localStorage.setItem(STORAGE_CHAT, JSON.stringify(m)); } catch {} };

    // ============================================================
    // DATE / LOCK / CANCEL HELPERS
    // ============================================================
    function getWeekDates(offset) {
      const now = new Date();
      const day = now.getDay();
      const diff = now.getDate() - day + (day === 0 ? -6 : 1);
      const mon = new Date(now);
      mon.setDate(diff + offset * 7);
      mon.setHours(0, 0, 0, 0);
      return Array.from({ length: 5 }, (_, i) => {
        const d = new Date(mon);
        d.setDate(mon.getDate() + i);
        return d;
      });
    }

    const fmt    = (d) => d.toLocaleDateString("en-AU", { day: "numeric", month: "short" });
    const isoKey = (d) => { const x = new Date(d); x.setHours(12,0,0,0); return x.toISOString().slice(0, 10); };

    // Week locks at Tuesday 23:59 of the PREVIOUS week.
    function getLockTime(monday) {
      const lock = new Date(monday);
      lock.setDate(lock.getDate() - 6); // Tuesday of previous week
      lock.setHours(23, 59, 59, 999);
      return lock;
    }
    // Only future weeks can lock. Current and past weeks stay editable in the UI.
    function isWeekLocked(monday) {
      const thisMon = getWeekDates(0)[0];
      if (monday <= thisMon) return false;
      return new Date() > getLockTime(monday);
    }

    // Late cancel = within cutoff days of the booking date.
    function isLateCancel(dateIso, cutoffDays = LATE_CANCEL_CUTOFF_DAYS) {
      const target = new Date(dateIso + "T00:00:00");
      const cutoff = new Date(target);
      cutoff.setDate(cutoff.getDate() - cutoffDays);
      return new Date() > cutoff;
    }

    // Block overlap check: two activities collide if their [start..end] ranges overlap.
    function blocksOverlap(a, b) {
      return !(a.end_block < b.start_block || b.end_block < a.start_block);
    }

    // Find existing booking on the same date that conflicts with the candidate activity.
    function findConflict(dateBookings, candidate) {
      return dateBookings.find(bk => {
        const act = ACTIVITIES.find(a => a.id === bk.activityId);
        return act && blocksOverlap(act, candidate);
      });
    }

    // ============================================================
    // SPLASH (unchanged design)
    // ============================================================
    function Splash({ onStart }) {
      return (
        <div className="route-enter" style={{
          minHeight: "100vh", background: "var(--gradient)", position: "relative", overflow: "hidden",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          padding: "32px 28px", textAlign: "center", color: "#fff"
        }}>
          {/* Decorative blobs */}
          <div style={{ position: "absolute", top: -160, right: -160, width: 420, height: 420, borderRadius: "50%", background: "rgba(255,255,255,0.06)" }} />
          <div style={{ position: "absolute", bottom: -120, left: -120, width: 320, height: 320, borderRadius: "50%", background: "rgba(255,255,255,0.05)" }} />

          <div style={{ position: "relative", zIndex: 1, animation: "pop 0.6s cubic-bezier(0.22,1,0.36,1) both" }}>
            <img src="Public/mosaic-icon.png" alt="Mosaic icon" onError={e => { e.currentTarget.style.display = 'none'; }} style={{ width: 140, height: 140, marginBottom: 16, objectFit: "contain" }} />
            <div className="bebas" style={{ fontSize: 56, lineHeight: 0.9, color: "#fff", marginBottom: 4 }}>MOSAIC</div>
            <div className="label-cap" style={{ color: "rgba(255,255,255,0.85)", marginBottom: 32 }}>Elite Health Community Hub</div>
            <h1 className="lilita" style={{ fontSize: 38, margin: "0 0 8px", lineHeight: 1.1, color: "#fff" }}>
              Hey Trey! 👋
            </h1>
            <p style={{ fontSize: 16, color: "rgba(255,255,255,0.92)", margin: "0 0 44px", fontWeight: 500 }}>
              Ready to pick your activities for the week?
            </p>
            <button
              onClick={onStart}
              className="btn"
              style={{
                background: "#fff", color: "var(--deep-red)", border: "none",
                borderRadius: 999, padding: "18px 48px",
                fontSize: 22, cursor: "pointer", fontFamily: "'Lilita One', system-ui, sans-serif",
                boxShadow: "0 12px 32px rgba(0,0,0,0.25)", minHeight: 56
              }}
            >
              Let's Go 🙌
            </button>
            <div style={{ marginTop: 56, fontSize: 13, color: "rgba(255,255,255,0.7)", fontStyle: "italic" }}>
              Every family. Every person. Every step.
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // GENERIC MODAL
    // ============================================================
    function Modal({ children, onClose }) {
      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, background: "rgba(26,10,0,0.55)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 300, padding: 24, animation: "fadeIn 0.2s ease both"
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: "var(--off-white)", borderRadius: 24, padding: 28, maxWidth: 380, width: "100%",
            boxShadow: "0 20px 60px rgba(26,10,0,0.35)",
            animation: "pop 0.32s cubic-bezier(0.22,1,0.36,1) both",
            border: "1px solid rgba(255,107,0,0.12)"
          }}>
            {children}
          </div>
        </div>
      );
    }

    // ============================================================
    // ABOUT ME (feature 03 — stub form)
    // TODO(owner): replace fields with the structure from the Google Drive template.
    // ============================================================
    // About Me fields with prompts (TTS) and presets (chip suggestions)
    const ABOUT_FIELDS = [
      {
        key: "dislikes",
        label: "What I don't like",
        placeholder: "Foods, sounds, situations...",
        prompt: "What don't you like? It can be foods, sounds, places, or anything that bothers you.",
        presets: ["Loud noises", "Big crowds", "Spicy food", "Cold weather", "Bright lights", "Surprises", "Being rushed"]
      },
      {
        key: "allergies",
        label: "Allergies & reactions",
        placeholder: "What you're allergic to and what happens",
        prompt: "Do you have any allergies? What are you allergic to, and what happens when you have a reaction?",
        presets: ["None", "Peanuts", "Dairy", "Eggs", "Bee stings", "Penicillin", "Shellfish", "Pollen"]
      },
      {
        key: "regulators",
        label: "What helps me feel calm",
        placeholder: "Music, walks, quiet rooms...",
        prompt: "When you feel upset or overwhelmed, what helps you feel calm again?",
        presets: ["Music", "Going for a walk", "Quiet time", "Hot shower", "Drawing", "Talking to family", "My pet", "Deep breaths"]
      },
      {
        key: "background",
        label: "About my life",
        placeholder: "Family, where you grew up, what you love",
        prompt: "Tell us about your life. Your family, where you grew up, the things you love.",
        presets: ["I love my family", "I have a pet", "I enjoy fishing", "I like cooking", "I love music", "I grew up in Gippsland"]
      },
    ];

    // Browser speech support
    const SR = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);
    const speechSupported = !!SR && typeof window !== "undefined" && "speechSynthesis" in window;

    function speak(text, opts = {}) {
      if (typeof window === "undefined" || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.95;
      u.pitch = 1.0;
      if (opts.onend) u.onend = opts.onend;
      window.speechSynthesis.speak(u);
    }

    function AboutMe({ onBack }) {
      const [profile, setProfile] = useState(loadProfile);
      const [saved, setSaved] = useState(false);
      const [mode, setMode] = useState("type"); // 'type' | 'talk'
      const [talkIdx, setTalkIdx] = useState(0);
      const [listening, setListening] = useState(false);
      const [speaking, setSpeaking] = useState(false);
      const recRef = React.useRef(null);

      const update = (field, value) => setProfile(p => ({ ...p, [field]: value }));
      const append = (field, value) => setProfile(p => {
        const cur = (p[field] || "").trim();
        const next = cur ? `${cur}, ${value}` : value;
        return { ...p, [field]: next };
      });
      const save = () => { saveProfile(profile); setSaved(true); setTimeout(() => setSaved(false), 2000); };

      // Stop everything when leaving / unmounting
      useEffect(() => () => {
        try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch {}
        try { recRef.current && recRef.current.abort(); } catch {}
      }, []);

      const playPrompt = (text) => {
        setSpeaking(true);
        speak(text, { onend: () => setSpeaking(false) });
      };

      const startListening = (field) => {
        if (!SR) return;
        try { recRef.current && recRef.current.abort(); } catch {}
        const rec = new SR();
        rec.lang = "en-AU";
        rec.interimResults = false;
        rec.maxAlternatives = 1;
        rec.continuous = false;
        rec.onresult = (e) => {
          const text = e.results[0][0].transcript;
          update(field, ((profile[field] || "") + (profile[field] ? " " : "") + text).trim());
        };
        rec.onerror = () => setListening(false);
        rec.onend = () => setListening(false);
        recRef.current = rec;
        setListening(true);
        try { rec.start(); } catch { setListening(false); }
      };

      const stopListening = () => {
        try { recRef.current && recRef.current.stop(); } catch {}
        setListening(false);
      };

      const current = ABOUT_FIELDS[talkIdx];
      const goNext = () => setTalkIdx(i => Math.min(i + 1, ABOUT_FIELDS.length - 1));
      const goPrev = () => setTalkIdx(i => Math.max(i - 1, 0));
      const isLast = talkIdx === ABOUT_FIELDS.length - 1;

      return (
        <div className="route-enter" style={{ padding: "20px 18px 80px", maxWidth: 500, margin: "0 auto" }}>
          <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 16, fontWeight: 700, color: "var(--deep-red)", cursor: "pointer", marginBottom: 12, padding: 0 }}>‹ Back</button>
          <h1 className="lilita" style={{ fontSize: 32, margin: "0 0 6px", lineHeight: 1.1, color: "var(--dark)" }}>About Me 💁</h1>
          <p style={{ color: "#666", fontSize: 15, marginBottom: 18 }}>Tell us what we should know.</p>

          {/* Mode toggle */}
          <div style={{ display: "flex", background: "#fff", borderRadius: 14, padding: 4, marginBottom: 22, boxShadow: "var(--shadow-card)" }}>
            {[
              { id: "type", label: "Type", emoji: "⌨️" },
              { id: "talk", label: "Talk", emoji: "🎙️" },
            ].map(t => (
              <button key={t.id} onClick={() => { setMode(t.id); setTalkIdx(0); stopListening(); }} style={{
                flex: 1, background: mode === t.id ? "var(--gradient)" : "transparent",
                color: mode === t.id ? "#fff" : "var(--dark)",
                border: "none", borderRadius: 11, padding: "12px 8px",
                fontSize: 15, fontWeight: 800, cursor: "pointer", minHeight: 56,
                display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                boxShadow: mode === t.id ? "var(--shadow-warm)" : "none"
              }}>
                <span style={{ fontSize: 20 }}>{t.emoji}</span> {t.label}
              </button>
            ))}
          </div>

          {/* TYPE MODE — all questions with preset chips */}
          {mode === "type" && (
            <div>
              {ABOUT_FIELDS.map(f => (
                <div key={f.key} style={{ marginBottom: 22 }}>
                  <label style={{ display: "block", fontWeight: 700, fontSize: 15, marginBottom: 8 }}>{f.label}</label>
                  <textarea
                    value={profile[f.key] || ""}
                    onChange={e => update(f.key, e.target.value)}
                    placeholder={f.placeholder}
                    rows={3}
                    style={{ width: "100%", padding: 14, borderRadius: 14, border: "2px solid #eee", fontSize: 16, fontFamily: "inherit", resize: "vertical", minHeight: 56, background: "#fff" }}
                  />
                  <div style={{ marginTop: 8, display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {f.presets.map(p => (
                      <button key={p} onClick={() => append(f.key, p)} style={{
                        background: "var(--peach)", color: "var(--dark)",
                        border: "1.5px solid rgba(255,107,0,0.25)", borderRadius: 999,

    // ============================================================
    // SERVICE REQUEST (feature 09)

    const SERVICE_OPTIONS = [

      { type: "cleaning",    emoji: "🧽", label: "House cleaning" },

              Send Request

      return (
        <div className="route-enter" style={{ padding: "20px 18px 80px", maxWidth: 500, margin: "0 auto" }}>
          <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 16, fontWeight: 700, color: "var(--deep-red)", cursor: "pointer", marginBottom: 12, padding: 0 }}>‹ Back</button>
          <h1 className="lilita" style={{ fontSize: 32, margin: "0 0 6px", lineHeight: 1.1, color: "var(--dark)" }}>Need help? 💛</h1>
          <p style={{ color: "#666", fontSize: 15, marginBottom: 22 }}>Tap what you need.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

    // ============================================================
    // WEEK SUMMARY — shown after Save, and as the landing view on return.
    // ============================================================
    function WeekSummary({ onEdit }) {
      const [weekOffset, setWeekOffset] = useState(0);
      const bookings = loadBookings();
      const weekDates = useMemo(() => getWeekDates(weekOffset), [weekOffset]);
      const weekLabel = `${fmt(weekDates[0])} – ${fmt(weekDates[4])}`;

      const dayItems = (date) => {
        const list = (bookings[isoKey(date)] || []).filter(b => b.status === "pending" || b.status === "confirmed");
        return list.map(bk => ({ ...bk, activity: ACTIVITIES.find(a => a.id === bk.activityId) })).filter(x => x.activity);

      return (

              <div className="label-cap" style={{ fontSize: 9, color: "rgba(255,255,255,0.85)" }}>Elite Health Community Hub</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.15)", backdropFilter: "blur(8px)", borderRadius: 16, padding: "10px 16px", position: "relative" }}>
              <button onClick={() => setWeekOffset(w => w - 1)} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", width: 36, height: 36, borderRadius: 12 }}>‹</button>
              <div style={{ textAlign: "center" }}>
                <div className="label-cap" style={{ opacity: 0.75, marginBottom: 2 }}>Week of</div>
                <div className="bebas" style={{ fontSize: 20 }}>{weekLabel}</div>
              </div>
              <button onClick={() => setWeekOffset(w => w + 1)} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", width: 36, height: 36, borderRadius: 12 }}>›</button>

          <div style={{ padding: "20px 18px 100px", maxWidth: 500, margin: "0 auto" }}>
            <h1 className="lilita" style={{ fontSize: 34, margin: "0 0 4px", color: "var(--dark)", lineHeight: 1.1 }}>Your week 🗓️</h1>

                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

                      return (
                        <div key={activityId} style={{ background: "#fff", borderRadius: 18, padding: "14px 16px", boxShadow: "0 2px 10px rgba(0,0,0,0.07)", display: "flex", alignItems: "center", gap: 14, borderLeft: `5px solid ${act.color}` }}>
                          <div style={{ width: 52, height: 52, borderRadius: 16, background: act.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, flexShrink: 0 }}>{act.emoji}</div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 700, fontSize: 16 }}>{act.name}</div>
                            <div style={{ fontSize: 13, color: "#666", marginTop: 2 }}>
                              {blockLabel}

                            </div>
                          </div>
                        </div>

            {totalSessions === 0 && (
              <div style={{ textAlign: "center", padding: "40px 20px", color: "#aaa", fontSize: 15 }}>😴 No sessions yet — tap below to pick some.</div>
            )}

            <button onClick={onEdit} style={{ width: "100%", background: "var(--gradient)", color: "#fff", border: "none", borderRadius: 18, padding: 18, fontSize: 19, cursor: "pointer", boxShadow: "var(--shadow-warm)", marginTop: 18, minHeight: 56, fontFamily: "'Lilita One', system-ui, sans-serif", letterSpacing: "0.02em" }}>

    // ============================================================
    // NIGHT-BEFORE SMS PREVIEW (feature 10)
    // Production: Vercel cron at 19:00 local hits a serverless route that
    // queries tomorrow's bookings, formats this message, sends via Twilio,
    // and inserts into notifications_log. This component shows the text that
    // WOULD be sent so the owner can sanity-check copy before wiring Twilio.
    // ============================================================
    function buildSmsForBooking(participantName, activity, dateIso) {
      const blockLabel = BLOCKS.find(b => b.id === activity.start_block)?.label || activity.time;
      let msg = `Tomorrow: ${participantName} wants to ${activity.name} from ${blockLabel}.`;
      if (activity.bring_money) {
        msg += ` You'll need to bring $${activity.bring_money} — Mosaic doesn't pay for client lunches.`;
      }
      return msg;
    }

    function fmtTime(iso) {
      try { return new Date(iso).toLocaleTimeString("en-AU", { hour: "numeric", minute: "2-digit" }); }
      catch { return ""; }
    }

    function seedChat() {
      const participantName = "Trey";
      const bookings = loadBookings();
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tIso = isoKey(tomorrow);
      const list = (bookings[tIso] || []).filter(b => b.status === "pending" || b.status === "confirmed");

      const now = new Date();
      const msgs = [{
        id: 1, from: "them", at: new Date(now.getTime() - 60000).toISOString(),
        text: `Hi ${participantName}! 👋 Here's what's coming up tomorrow.`
      }];
      list.forEach((bk, i) => {
        const act = ACTIVITIES.find(a => a.id === bk.activityId);
        if (!act) return;
        msgs.push({
          id: 2 + i, from: "them",
          at: new Date(now.getTime() - 50000 + i * 1000).toISOString(),
          text: buildSmsForBooking(participantName, act, tIso)
        });
      });
      if (list.length === 0) {
        msgs.push({
          id: 2, from: "them", at: new Date().toISOString(),
          text: "Nothing booked for tomorrow yet — pop into Edit week and pick something! ✏️"
        });
      }
      return msgs;
    }

    function ChatScreen({ onBack }) {
      const [messages, setMessages] = useState(() => loadChat() || seedChat());
      const [draft, setDraft] = useState("");
      const scrollerRef = React.useRef(null);

      useEffect(() => { saveChat(messages); }, [messages]);
      useEffect(() => {
        if (scrollerRef.current) scrollerRef.current.scrollTop = scrollerRef.current.scrollHeight;
      }, [messages]);

      const send = () => {
        const text = draft.trim();
        if (!text) return;
        setMessages(m => [...m, { id: Date.now(), from: "me", at: new Date().toISOString(), text }]);
        setDraft("");
        // TODO(supabase): post to messages table; trigger worker notification.
        // Auto-reply stub so the chat feels alive in prototype.
        setTimeout(() => {
          setMessages(m => [...m, {
            id: Date.now() + 1, from: "them", at: new Date().toISOString(),
            text: "Thanks! We'll get back to you soon 💛"
          }]);
        }, 900);
      };

      const onKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "#F7F5F2" }}>
          {/* Chat header — fixed top */}
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, background: "#fff", borderBottom: "1px solid #eee", padding: "10px 14px", display: "flex", alignItems: "center", gap: 12, zIndex: 20 }}>
            <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 22, color: "var(--deep-red)", cursor: "pointer", padding: "4px 8px", minWidth: 36 }}>‹</button>
            <div style={{ width: 40, height: 40, borderRadius: "50%", background: "var(--gradient)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontFamily: "'Lilita One', system-ui, sans-serif", flexShrink: 0, boxShadow: "var(--shadow-warm)" }}>M</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 800, fontSize: 16, color: "#1a1a1a" }}>Mosaic Team</div>
              <div style={{ fontSize: 12, color: "#27AE60", display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#27AE60", display: "inline-block" }} />
                Active now
              </div>
            </div>
          </div>

          {/* Messages — scrolls between fixed header and fixed composer */}
          <div ref={scrollerRef} style={{ position: "absolute", top: 60, left: 0, right: 0, bottom: 70, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "14px 12px", display: "flex", flexDirection: "column", gap: 4 }}>
            {messages.map((msg, i) => {
              const mine = msg.from === "me";
              const prev = messages[i - 1];
              const next = messages[i + 1];
              const grouped = prev && prev.from === msg.from && (new Date(msg.at) - new Date(prev.at) < 60000);
              const last = !next || next.from !== msg.from;
              const showTime = !next || next.from !== msg.from || (new Date(next.at) - new Date(msg.at) >= 60000);

              const bubbleColor = mine ? "var(--deep-red)" : "#fff";
              const textColor = mine ? "#fff" : "#1a1a1a";
              const radius = mine
                ? `20px ${grouped ? "6px" : "20px"} ${last ? "20px" : "6px"} 20px`
                : `${grouped ? "6px" : "20px"} 20px 20px ${last ? "20px" : "6px"}`;

              return (
                <div key={msg.id} style={{ display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start", marginTop: grouped ? 0 : 6 }}>
                  <div style={{
                    background: bubbleColor, color: textColor,
                    padding: "10px 14px", borderRadius: radius,
                    maxWidth: "78%", fontSize: 15, lineHeight: 1.4,
                    boxShadow: mine ? "none" : "0 1px 2px rgba(0,0,0,0.06)",
                    border: mine ? "none" : "1px solid #eee",
                    wordBreak: "break-word", whiteSpace: "pre-wrap"
                  }}>
                    {msg.text}
                  </div>
                  {showTime && (
                    <div style={{ fontSize: 10, color: "#999", margin: "4px 8px 2px", fontWeight: 600 }}>
                      {fmtTime(msg.at)}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Composer — floating, always visible */}
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: "1px solid #eee", padding: "10px 12px calc(10px + env(safe-area-inset-bottom))", display: "flex", gap: 8, alignItems: "flex-end", zIndex: 20, boxShadow: "0 -2px 12px rgba(0,0,0,0.06)" }}>
            <textarea
              value={draft}
              onChange={e => setDraft(e.target.value)}
              onKeyDown={onKey}
              placeholder="Type a message..."
              rows={1}
              style={{ flex: 1, padding: "10px 14px", borderRadius: 22, border: "1px solid #eee", background: "#F0F2F5", fontSize: 16, fontFamily: "inherit", resize: "none", maxHeight: 120, outline: "none", lineHeight: 1.4 }}
            />
            <button onClick={send} disabled={!draft.trim()} style={{
              background: draft.trim() ? "var(--deep-red)" : "#f0f0f0",
              color: draft.trim() ? "#fff" : "#ccc",
              border: "none", borderRadius: "50%", width: 44, height: 44,
              fontSize: 20, cursor: draft.trim() ? "pointer" : "default",
              flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center"
            }}>➤</button>
          </div>
        </div>
      );
    }

      { route: "scheduler", emoji: "✏️", label: "Edit" },

    // ============================================================
    // SCHEDULER (features 01, 02, 06, 08)
    // ============================================================
    function Scheduler({ onSaved }) {
      const [weekOffset, setWeekOffset] = useState(0);
      const [selectedDay, setSelectedDay] = useState(null);
      const [bookings, setBookings] = useState(loadBookings); // { isoDate: [{activityId, status, addedAt, ...}] }
      const [toast, setToast] = useState(null);
      const [star, setStar] = useState(null);
      const [confirm, setConfirm] = useState(null);    // {activity, dateIso, anchor}
      const [conflict, setConflict] = useState(null);  // {existingActivity, candidateActivity}
      const [cancelAsk, setCancelAsk] = useState(null); // {activity, dateIso, late}
      const [modeTab, setModeTab] = useState(CURRENT_PARTICIPANT_MODE === "one_on_one" ? "one_on_one" : "program");
      const showModeTabs = CURRENT_PARTICIPANT_MODE === "both";

      useEffect(() => { saveBookings(bookings); }, [bookings]);

      const weekDates = useMemo(() => getWeekDates(weekOffset), [weekOffset]);
      const weekLabel = `${fmt(weekDates[0])} – ${fmt(weekDates[4])}`;
      const weekLocked = isWeekLocked(weekDates[0]);

      const dayIso = (dayIdx) => isoKey(weekDates[dayIdx - 1]);
      const dayBookings = (dayIdx) => bookings[dayIso(dayIdx)] || [];

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3200); };

      const showStar = (anchor) => {
        if (!anchor) return;
        const id = Date.now();
        setStar({ id, x: anchor.x, y: anchor.y });
        setTimeout(() => setStar(null), 1100);
      };

      // Tap "+ Add" → confirm modal
      const requestAdd = (activity, dayIdx, el) => {
        const dateIso = dayIso(dayIdx);
        const existing = bookings[dateIso] || [];
        if (existing.some(b => b.activityId === activity.id)) return;

        const conflictBk = findConflict(existing, activity);
        if (conflictBk) {
          const ex = ACTIVITIES.find(a => a.id === conflictBk.activityId);
          setConflict({ existingActivity: ex, candidateActivity: activity });
          return;
        }
        const rect = el.getBoundingClientRect();
        setConfirm({ activity, dateIso, anchor: { x: rect.left + rect.width / 2, y: rect.top } });
      };

      const confirmAdd = () => {
        const { activity, dateIso, anchor } = confirm;
        setBookings(prev => ({
          ...prev,
          [dateIso]: [...(prev[dateIso] || []), {
            activityId: activity.id,
            status: "pending",
            addedAt: new Date().toISOString(),
          }]
        }));
        showStar(anchor);
        setConfirm(null);
      };

      // Tap × on a booked card → maybe late-cancel modal
      const requestRemove = (activityId, dayIdx) => {
        const dateIso = dayIso(dayIdx);
        const activity = ACTIVITIES.find(a => a.id === activityId);
        if (isLateCancel(dateIso) && !activity?.practitioner_led) {
          setCancelAsk({ activity, dateIso, late: true });
        } else {
          doRemove(activityId, dateIso, false);
        }
      };

      const doRemove = (activityId, dateIso, late) => {
        setBookings(prev => {
          const list = prev[dateIso] || [];
          if (late) {
            return {
              ...prev,
              [dateIso]: list.map(b => b.activityId === activityId
                ? { ...b, status: "late_cancelled", cancel_charge: true, cancelled_at: new Date().toISOString() }
                : b)
            };
          }
          return { ...prev, [dateIso]: list.filter(b => b.activityId !== activityId) };
        });
        setCancelAsk(null);
      };

      const totalSessions = Object.values(bookings).flat().filter(b => b.status === "pending" || b.status === "confirmed").length;
      const activeMode = showModeTabs ? modeTab : CURRENT_PARTICIPANT_MODE;
      const availableForDay = useMemo(() => {
        if (!selectedDay) return [];
        return ACTIVITIES.filter(a =>
          a.days.includes(selectedDay) && (a.mode === activeMode || a.mode === "both")
        );
      }, [selectedDay, activeMode]);

      return (
        <div className="route-enter" style={{ background: "var(--off-white)", minHeight: "100vh", color: "var(--dark)" }}>
          <style>{`
            @keyframes starMain {
              0%   { opacity: 0; transform: translate(-50%, 0px) scale(0.3) rotate(-10deg); }
              25%  { opacity: 1; transform: translate(-50%, -30px) scale(1.2) rotate(6deg); }
              60%  { opacity: 1; transform: translate(-50%, -60px) scale(1) rotate(-3deg); }
              100% { opacity: 0; transform: translate(-50%, -110px) scale(0.7) rotate(8deg); }
            }
            @keyframes starLeft  { 0% { opacity:0; transform: translate(0,0) scale(0.2);} 30% { opacity:1; transform: translate(-22px,-25px) scale(1) rotate(-15deg);} 100% { opacity:0; transform: translate(-50px,-105px) scale(0.4) rotate(-35deg);} }
            @keyframes starRight { 0% { opacity:0; transform: translate(0,0) scale(0.2);} 35% { opacity:1; transform: translate(20px,-18px) scale(1) rotate(12deg);} 100% { opacity:0; transform: translate(44px,-100px) scale(0.4) rotate(35deg);} }
          `}</style>

          {star && (
            <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 200 }}>
              <div style={{ position: "absolute", left: star.x, top: star.y, fontSize: 48, lineHeight: 1, animation: "starMain 1.05s cubic-bezier(0.22,1,0.36,1) forwards", filter: "drop-shadow(0 2px 10px rgba(232,48,0,0.55))" }}>⭐</div>
              <div style={{ position: "absolute", left: star.x, top: star.y, fontSize: 24, lineHeight: 1, animation: "starLeft 1.05s cubic-bezier(0.22,1,0.36,1) forwards", animationDelay: "60ms" }}>⭐</div>
              <div style={{ position: "absolute", left: star.x, top: star.y, fontSize: 22, lineHeight: 1, animation: "starRight 1.05s cubic-bezier(0.22,1,0.36,1) forwards", animationDelay: "30ms" }}>⭐</div>
            </div>
          )}

          {toast && (
            <div style={{ position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)", background: "#1a1a1a", color: "#fff", borderRadius: 18, padding: "14px 28px", zIndex: 100, boxShadow: "0 4px 24px rgba(0,0,0,0.25)", fontSize: 15, fontWeight: 700, whiteSpace: "nowrap" }}>
              {toast}
            </div>
          )}

          {/* Header — brand gradient */}
          <div style={{ background: "var(--gradient)", padding: "20px 20px 18px", color: "#fff", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -80, right: -80, width: 200, height: 200, borderRadius: "50%", background: "rgba(255,255,255,0.06)" }} />
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", marginBottom: 14, position: "relative", gap: 2 }}>
              <img src="Public/mosaic-icon.png" alt="Mosaic" onError={e => { e.currentTarget.style.display = 'none'; }} style={{ width: 56, height: 56, objectFit: "contain", marginBottom: 4 }} />
              <div className="bebas" style={{ fontSize: 26, color: "#fff", lineHeight: 0.9 }}>MOSAIC</div>
              <div className="label-cap" style={{ fontSize: 9, color: "rgba(255,255,255,0.85)" }}>Elite Health Community Hub</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.15)", backdropFilter: "blur(8px)", borderRadius: 16, padding: "10px 16px", position: "relative" }}>
              <button onClick={() => { setWeekOffset(w => w - 1); setSelectedDay(null); }} className="btn" style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", width: 36, height: 36, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
              <div style={{ textAlign: "center" }}>
                <div className="label-cap" style={{ opacity: 0.75, marginBottom: 2 }}>Week of</div>
                <div className="bebas" style={{ fontSize: 20 }}>{weekLabel}</div>
              </div>
              <button onClick={() => { setWeekOffset(w => w + 1); setSelectedDay(null); }} className="btn" style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", width: 36, height: 36, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
            </div>
          </div>

          <div style={{ padding: "16px 14px", maxWidth: 500, margin: "0 auto" }}>
            {weekLocked && (
              <div style={{ background: "var(--peach)", border: "2px solid var(--amber)", borderRadius: 14, padding: "12px 14px", marginBottom: 14, fontSize: 14, color: "var(--dark)", fontWeight: 600 }}>
                🔒 This week is locked. Tap a session to ask about a change.
              </div>
            )}

            {showModeTabs && (
              <div style={{ display: "flex", background: "#fff", borderRadius: 14, padding: 4, marginBottom: 14, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                {[{ id: "program", label: "Programs", emoji: "👥" }, { id: "one_on_one", label: "1:1 Support", emoji: "🤝" }].map(t => (
                  <button key={t.id} onClick={() => { setModeTab(t.id); setSelectedDay(null); }} style={{
                    flex: 1, background: modeTab === t.id ? "var(--deep-red)" : "transparent",
                    color: modeTab === t.id ? "#fff" : "#666",
                    border: "none", borderRadius: 11, padding: "12px 8px",
                    fontSize: 14, fontWeight: 800, cursor: "pointer", minHeight: 56,
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 6
                  }}>
                    <span style={{ fontSize: 18 }}>{t.emoji}</span> {t.label}
                  </button>
                ))}
              </div>
            )}

            {!selectedDay && !weekLocked && (
              <div style={{ textAlign: "center", padding: "14px 10px 10px", color: "#555", fontSize: 15, fontWeight: 600 }}>
                👇 <span style={{ color: "var(--deep-red)" }}>Tap</span> a day to see what's on
              </div>
            )}

            {/* Calendar Grid */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 8, marginBottom: 20 }}>
              {[1, 2, 3, 4, 5].map(d => {
                const date = weekDates[d - 1];
                const bks = dayBookings(d).filter(b => b.status === "pending" || b.status === "confirmed");
                const isSelected = selectedDay === d;
                const slots = Math.max(0, 2 - bks.length);
                return (
                  <div key={d} onClick={() => setSelectedDay(isSelected ? null : d)} style={{ background: "#fff", border: isSelected ? "2.5px solid var(--deep-red)" : "2px solid #eee", borderRadius: 16, padding: "10px 6px", cursor: "pointer", boxShadow: isSelected ? "0 4px 16px rgba(232,48,0,0.22)" : "0 2px 8px rgba(0,0,0,0.06)", transition: "all 0.2s", minHeight: 110 }}>
                    <div style={{ textAlign: "center", marginBottom: 8 }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: isSelected ? "var(--deep-red)" : "#aaa", textTransform: "uppercase" }}>{DAY_NAMES[d - 1]}</div>
                      <div style={{ fontSize: 16, fontWeight: 800, color: "#1a1a1a" }}>{date.getDate()}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {bks.map(bk => {
                        const act = ACTIVITIES.find(a => a.id === bk.activityId);
                        if (!act) return null;
                        return (
                          <div key={bk.activityId} style={{ background: act.color + "22", border: `1px solid ${act.color}66`, borderRadius: 8, padding: "4px 5px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <span style={{ fontSize: 14 }}>{act.emoji}</span>
                            <button onClick={e => { e.stopPropagation(); requestRemove(bk.activityId, d); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, color: "#bbb", padding: 0 }}>✕</button>
                          </div>
                        );
                      })}
                      {[...Array(slots)].map((_, i) => (
                        <div key={i} style={{ border: "1.5px dashed #ddd", borderRadius: 8, height: 28, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <span style={{ fontSize: 10, color: "#ccc" }}>+</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Activity Drawer */}
            {selectedDay && (
              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <h2 style={{ margin: 0, fontSize: 17, fontWeight: 800 }}>{DAY_FULL[selectedDay - 1]}</h2>
                  <button onClick={() => setSelectedDay(null)} style={{ background: "#f0f0f0", border: "none", fontSize: 12, color: "#666", cursor: "pointer", fontWeight: 700, borderRadius: 10, padding: "6px 12px" }}>Close ✕</button>
                </div>
                {availableForDay.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "32px 20px", color: "#aaa", fontSize: 15 }}>😴 Nothing on this day</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
                    {availableForDay.map(act => {
                      const alreadyBooked = dayBookings(selectedDay).some(b => b.activityId === act.id && (b.status === "pending" || b.status === "confirmed"));
                      const blockLabel = BLOCKS.find(b => b.id === act.start_block)?.label || act.time;
                      const disabled = alreadyBooked || weekLocked;
                      return (
                        <div key={act.id} style={{ background: "#fff", borderRadius: 18, padding: "14px 16px", boxShadow: "0 2px 10px rgba(0,0,0,0.07)", border: alreadyBooked ? `2.5px solid ${act.color}` : "2.5px solid transparent", display: "flex", alignItems: "center", gap: 14, transition: "all 0.2s" }}>
                          <div style={{ width: 56, height: 56, borderRadius: 16, background: act.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, flexShrink: 0 }}>{act.emoji}</div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 700, fontSize: 15 }}>{act.name}</div>
                            <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>
                              {blockLabel}
                              {act.location && <span style={{ marginLeft: 8, background: "#f0f0f0", color: "#555", borderRadius: 8, padding: "1px 8px", fontSize: 11, fontWeight: 600 }}>{act.location}</span>}
                            </div>
                            <span style={{ background: act.color + "20", color: act.color, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700, marginTop: 5, display: "inline-block" }}>{act.category}</span>
                          </div>
                          <button
                            onClick={(e) => requestAdd(act, selectedDay, e.currentTarget)}
                            disabled={disabled}
                            style={{ background: alreadyBooked ? "#f5f5f5" : (weekLocked ? "#ddd" : "var(--deep-red)"), color: alreadyBooked ? "#888" : (weekLocked ? "#999" : "#fff"), border: "none", borderRadius: 14, padding: "14px 16px", fontWeight: 700, fontSize: 14, cursor: disabled ? "default" : "pointer", flexShrink: 0, minWidth: 80, minHeight: 56 }}
                          >
                            {alreadyBooked ? "✓ Added" : (weekLocked ? "🔒" : "+ Add")}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* Save CTA */}
            {!selectedDay && (
              <button
                onClick={() => { if (totalSessions > 0) { showToast("Your program has been saved! 🎉"); setTimeout(() => onSaved && onSaved(), 700); } }}
                style={{ width: "100%", background: totalSessions > 0 ? "var(--gradient)" : "#ebebeb", color: totalSessions > 0 ? "#fff" : "#aaa", border: "none", borderRadius: 18, padding: "18px", fontSize: 19, cursor: totalSessions > 0 ? "pointer" : "not-allowed", marginTop: 4, marginBottom: 32, boxShadow: totalSessions > 0 ? "var(--shadow-warm)" : "none", minHeight: 56, fontFamily: "'Lilita One', system-ui, sans-serif", letterSpacing: "0.02em" }}
              >
                {totalSessions > 0 ? `Save My Week ✨  (${totalSessions} session${totalSessions !== 1 ? "s" : ""})` : "What do you want to do this week?"}
              </button>
            )}
          </div>

          {/* CONFIRM MODAL (feature 01) */}
          {confirm && (
            <Modal onClose={() => setConfirm(null)}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 56, marginBottom: 8 }}>{confirm.activity.emoji}</div>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Add {confirm.activity.name}?</h2>
                <p style={{ color: "#666", fontSize: 15, margin: "0 0 22px" }}>
                  {DAY_FULL[selectedDay - 1]} · {BLOCKS.find(b => b.id === confirm.activity.start_block)?.label}
                </p>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setConfirm(null)} style={{ flex: 1, background: "#f0f0f0", color: "#666", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 700, cursor: "pointer", minHeight: 56 }}>Cancel</button>
                  <button onClick={confirmAdd} style={{ flex: 1, background: "var(--deep-red)", color: "#fff", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 800, cursor: "pointer", minHeight: 56 }}>Yes, add</button>
                </div>
              </div>
            </Modal>
          )}

          {/* OVERLAP MODAL (feature 02) — hard block */}
          {conflict && (
            <Modal onClose={() => setConflict(null)}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 56, marginBottom: 8 }}>⏰</div>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Time clash!</h2>
                <p style={{ color: "#444", fontSize: 16, margin: "0 0 22px", lineHeight: 1.4 }}>
                  You're already booked for <b>{conflict.existingActivity.name}</b> at this time. You can't do both.
                </p>
                <button onClick={() => setConflict(null)} style={{ width: "100%", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 800, cursor: "pointer", minHeight: 56 }}>OK</button>
              </div>
            </Modal>
          )}

          {/* LATE CANCEL MODAL (feature 08) */}
          {cancelAsk && (
            <Modal onClose={() => setCancelAsk(null)}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 56, marginBottom: 8 }}>⚠️</div>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Late cancellation</h2>
                <p style={{ color: "#444", fontSize: 16, margin: "0 0 22px", lineHeight: 1.4 }}>
                  This is classified as a late cancellation. You will be charged for this session. Please proceed.
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <button onClick={() => doRemove(cancelAsk.activity.id, cancelAsk.dateIso, true)} style={{ background: "var(--deep-red)", color: "#fff", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 800, cursor: "pointer", minHeight: 56 }}>Cancel anyway</button>
                  <button onClick={() => setCancelAsk(null)} style={{ background: "#f0f0f0", color: "#1a1a1a", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 700, cursor: "pointer", minHeight: 56 }}>Keep booking</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ============================================================
    // ROOT APP
    // ============================================================
    function hasAnyBookings() {
      const b = loadBookings();
      return Object.values(b).some(list => list.some(x => x.status === "pending" || x.status === "confirmed"));
    }

    function App() {
      const [started, setStarted] = useState(() => !!localStorage.getItem(STORAGE_STARTED));
      const [route, setRoute] = useState(() => hasAnyBookings() ? "summary" : "scheduler");

      const start = () => {
        try { localStorage.setItem(STORAGE_STARTED, "1"); } catch {}
        setStarted(true);
      };

      if (!started) return <Splash onStart={start} />;

      const onChat = route === "sms";
      return (
        <div style={{ paddingBottom: onChat ? 0 : 80 }}>
          {route === "summary"   && <WeekSummary    onEdit={() => setRoute("scheduler")} />}
          {route === "scheduler" && <Scheduler      onSaved={() => setRoute("summary")} />}
          {route === "about"     && <AboutMe        onBack={() => setRoute("summary")} />}
          {route === "service"   && <ServiceRequest onBack={() => setRoute("summary")} />}
          {route === "sms"       && <ChatScreen     onBack={() => setRoute("summary")} />}
          {!onChat && <BottomNav active={route} go={setRoute} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
