  <style>
    /* Mosaic Brand Bible v1.0 — May 2026 */
    :root {
      --flame: #FF6B00;
      --deep-red: #E83000;
      --crimson: #C41010;
      --amber: #FFB347;
      --cream: #FFF3E8;
      --peach: #FFE8D0;
      --dark: #1A0A00;
      --off-white: #FFFAF5;
      --gradient: linear-gradient(135deg, #FF6B00 0%, #E83000 55%, #C41010 100%);
      --gradient-soft: linear-gradient(135deg, #FFE8D0 0%, #FFF3E8 100%);
      --shadow-warm: 0 4px 20px rgba(232, 48, 0, 0.18);
      --shadow-card: 0 2px 12px rgba(26, 10, 0, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: var(--off-white); color: var(--dark); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    input, textarea { font-size: 16px; font-family: inherit; } /* iOS no-zoom */

    /* ── Animation tokens ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.92); }
      60%  { opacity: 1; transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* ── Lava lamp background (animated gradient + drifting blurred blobs) ── */
    @keyframes lavaGrad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes lavaA {
      0%   { transform: translate(0,0) scale(1);      border-radius: 50% 50% 50% 50%; }
      50%  { transform: translate(42px,32px) scale(1.4); border-radius: 60% 40% 55% 45%; }
      100% { transform: translate(-18px,12px) scale(1.1); border-radius: 45% 55% 50% 50%; }
    }
    @keyframes lavaB {
      0%   { transform: translate(0,0) scale(1);       border-radius: 50%; }
      50%  { transform: translate(-46px,-26px) scale(1.32); border-radius: 55% 45% 60% 40%; }
      100% { transform: translate(16px,-10px) scale(1.06); border-radius: 50%; }
    }
    .lava {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #FF8A00 0%, #FF6B00 28%, #E83000 64%, #C41010 100%);
      background-size: 220% 220%;
      animation: lavaGrad 16s ease-in-out infinite;
    }
    .lava::before, .lava::after { content: ""; position: absolute; pointer-events: none; filter: blur(34px); opacity: 0.55; z-index: 0; }
    .lava::before { width: 260px; height: 260px; top: -90px; left: -60px; background: radial-gradient(circle at 30% 30%, #FFC061, rgba(255,150,40,0)); animation: lavaA 19s ease-in-out infinite alternate; }
    .lava::after  { width: 240px; height: 240px; bottom: -100px; right: -50px; background: radial-gradient(circle at 50% 50%, #FF3D00, rgba(196,16,16,0)); animation: lavaB 23s ease-in-out infinite alternate; }
    .lava > * { position: relative; z-index: 1; }
    @media (prefers-reduced-motion: reduce) { .lava, .lava::before, .lava::after { animation: none; } }

    /* Page transitions */
    .route-enter { animation: fadeUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }

    /* Button press feedback — global, applies to every button */
    button { transition: transform 0.12s cubic-bezier(0.22,1,0.36,1), box-shadow 0.15s, filter 0.15s; will-change: transform; }
    button:not(:disabled):active { transform: scale(0.96); filter: brightness(0.95); }
    .btn { transition: transform 0.12s cubic-bezier(0.22,1,0.36,1), box-shadow 0.15s, filter 0.15s; }
    .btn:active { transform: scale(0.96); filter: brightness(0.95); }

    /* Card hover (subtle on touch) */
    .card { transition: transform 0.15s, box-shadow 0.2s; }
    .card:active { transform: scale(0.99); }

    /* Mosaic typography helpers */
    .lilita { font-family: 'Lilita One', system-ui, sans-serif; letter-spacing: 0.01em; }
    .bebas { font-family: 'Bebas Neue', system-ui, sans-serif; letter-spacing: 0.06em; }
    .label-cap { font-family: 'Inter Tight', system-ui, sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ============================================================
    // CONFIG

    const STORAGE_BOOKINGS = "mosaic_bookings_v2";
    const STORAGE_STARTED  = "mosaic_started_v1";
    const STORAGE_PROFILE = "mosaic_profile_v1";
    const STORAGE_REQUESTS = "mosaic_service_requests_v1";
    const STORAGE_SMS = "mosaic_sms_queue_v1";
    const STORAGE_CHAT = "mosaic_chat_v1";

    const DB = window.MosaicDB;
    const LATE_CANCEL_CUTOFF_DAYS = CFG.LATE_CANCEL_CUTOFF_DAYS || 4; // org_settings.late_cancel_cutoff_days

    // Activities — keep emojis and colors per owner direction.

    const DAY_NAMES = ["Mon", "Tue", "Wed", "Thu", "Fri"];
    const DAY_FULL  = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
    // TODO(owner): spec says Mon–Sun. Prototype is Mon–Fri. Extend if/when owner OKs design change.

    // Participant identity comes from the logged-in session (set by db.js).
    // In demo mode there is one local participant; name falls back to profile.
    const sessionName = () => (DB && DB.auth.session && DB.auth.session.name) || loadProfile().name || "";
    const sessionMode = () => (DB && DB.auth.session && DB.auth.session.mode) || "both";

    // ============================================================
    // STORAGE HELPERS
    // ============================================================
    const safeParse = (s, fb) => { try { return JSON.parse(s) ?? fb; } catch { return fb; } };
    const loadBookings = () => safeParse(localStorage.getItem(STORAGE_BOOKINGS), {});
    const saveBookings = (b) => { try { localStorage.setItem(STORAGE_BOOKINGS, JSON.stringify(b)); } catch {} };
    const loadProfile  = () => safeParse(localStorage.getItem(STORAGE_PROFILE), {
      name: "", date: "",
      likes: {}, favoriteLikes: [],
      strengths: {}, favoriteStrengths: [],
      skills: {}, favoriteSkills: [],
      wellbeing: {},
      otherHobbies: "", otherStrengths: "", otherSkills: ""
    });
    const saveProfile  = (p) => { try { localStorage.setItem(STORAGE_PROFILE, JSON.stringify(p)); } catch {} };
    const loadRequests = () => safeParse(localStorage.getItem(STORAGE_REQUESTS), []);
    const saveRequests = (r) => { try { localStorage.setItem(STORAGE_REQUESTS, JSON.stringify(r)); } catch {} };
    const loadSms      = () => safeParse(localStorage.getItem(STORAGE_SMS), []);
    const saveSms      = (m) => { try { localStorage.setItem(STORAGE_SMS, JSON.stringify(m)); } catch {} };
    const loadChat     = () => safeParse(localStorage.getItem(STORAGE_CHAT), null);
    const saveChat     = (m) => { try { localStorage.setItem(STORAGE_CHAT, JSON.stringify(m)); } catch {} };

    // ============================================================
    // DATE / LOCK / CANCEL HELPERS
    // ============================================================
    function getWeekDates(offset) {
      const now = new Date();
      const day = now.getDay();
      const diff = now.getDate() - day + (day === 0 ? -6 : 1);
      const mon = new Date(now);
      mon.setDate(diff + offset * 7);
      mon.setHours(0, 0, 0, 0);
      return Array.from({ length: 5 }, (_, i) => {
        const d = new Date(mon);
        d.setDate(mon.getDate() + i);
        return d;
      });
    }

    const fmt    = (d) => d.toLocaleDateString("en-AU", { day: "numeric", month: "short" });
    const isoKey = (d) => { const x = new Date(d); x.setHours(12,0,0,0); return x.toISOString().slice(0, 10); };

    // Week locks at Tuesday 23:59 of the PREVIOUS week.
    function getLockTime(monday) {
      const lock = new Date(monday);
      lock.setDate(lock.getDate() - 6); // Tuesday of previous week
      lock.setHours(23, 59, 59, 999);
      return lock;
    }
    // Only future weeks can lock. Current and past weeks stay editable in the UI.
    function isWeekLocked(monday) {
      const thisMon = getWeekDates(0)[0];
      if (monday <= thisMon) return false;
      return new Date() > getLockTime(monday);
    }

    // Late cancel = within cutoff days of the booking date.
    function isLateCancel(dateIso, cutoffDays = LATE_CANCEL_CUTOFF_DAYS) {
      const target = new Date(dateIso + "T00:00:00");
      const cutoff = new Date(target);
      cutoff.setDate(cutoff.getDate() - cutoffDays);
      return new Date() > cutoff;
    }

    // Block overlap check: two activities collide if their [start..end] ranges overlap.
    function blocksOverlap(a, b) {
      return !(a.end_block < b.start_block || b.end_block < a.start_block);
    }

    // Find existing booking on the same date that conflicts with the candidate activity.
    function findConflict(dateBookings, candidate) {
      return dateBookings.find(bk => {
        const act = ACTIVITIES.find(a => a.id === bk.activityId);
        return act && blocksOverlap(act, candidate);
      });
    }

    // Human label for an activity's full time span (start block → end block).
    // Fixes the old bug where a 9am–3pm session displayed only "9am – 12pm".
    function blockRangeLabel(act) {
      const s = BLOCKS.find(b => b.id === act.start_block);
      const e = BLOCKS.find(b => b.id === act.end_block);
      if (!s) return act.time || "";
      if (!e || e.id === s.id) return s.label;
      return s.label.split(" – ")[0] + " – " + e.label.split(" – ")[1];
    }

    // Load activities from Supabase (if configured); otherwise keep built-ins.
    async function initActivities(onReady) {
      try {
        const list = DB && DB.activities && (await DB.activities.list());
        if (list && list.length) ACTIVITIES = list;
      } catch (e) { /* keep built-ins */ }
      onReady && onReady();
    }

    // ── Away helpers ──
    // Expand a list of {start,end} periods into a Set of ISO date strings.
    function expandAway(periods) {
      const set = new Set();
      (periods || []).forEach(p => {
        const s = new Date((p.start || p.start_date) + "T12:00:00");
        const e = new Date((p.end || p.end_date || p.start || p.start_date) + "T12:00:00");
        for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) set.add(d.toISOString().slice(0, 10));
      });
      return set;
    }
    const fmtAway = (iso) => new Date(iso + "T12:00:00").toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short" });
    function fmtAwayRange(p) {
      const s = p.start || p.start_date, e = p.end || p.end_date;
      return (!e || e === s) ? fmtAway(s) : fmtAway(s) + " → " + fmtAway(e);
    }

    // ============================================================
    // SPLASH (unchanged design)
    // ============================================================
    function Splash({ onStart, name }) {

            </h1>
            <p style={{ fontSize: 16, color: "rgba(255,255,255,0.92)", margin: "0 0 44px", fontWeight: 500 }}>

            </p>

              Every family. Every person. Every step.
            </div>
          </div>
        </div>

    }

    // ============================================================
    // GENERIC MODAL
    // ============================================================
    function Modal({ children, onClose }) {
      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, background: "rgba(26,10,0,0.55)",

    // ============================================================

    // 4 sections: Likes & Dislikes, Personal Strengths (sentences),

    // ============================================================
    const LIKES_OPTIONS = [

    const SKILLS_OPTIONS = [
      "Taking care of other people", "Working with other people", "Organising things",
      "Making changes", "Using a computer", "Answering a phone", "Woodworking",
      "House painting", "Operating machines or tools", "Fixing cars", "Waiting on tables",
      "Doing yard work", "Farming", "Hairdressing", "Cleaning", "Reading", "Writing",
      "Math", "Science", "Social Studies", "Art", "Sports", "Music", "Teaching friends",
      "Gardening", "Cooking", "Sewing or knitting", "Being a team captain"
    ];

    const WELLBEING_OPTIONS = [
      "I've been feeling optimistic about the future",
      "I've been feeling useful",
      "I've been feeling relaxed",
      "I've been feeling interested in other people",
      "I've had energy to spare",
      "I've been dealing with problems well",
      "I've been thinking clearly",
      "I've been feeling good about myself",
      "I've been feeling close to other people",
      "I've been feeling confident",
      "I've been able to make up my own mind about things",
      "I've been interested in new things",
      "I've been cheerful",
      "I've been feeling loved"
    ];

    const WELLBEING_SCALE = [
      { value: 1, label: "None" },
      { value: 2, label: "Rarely" },
      { value: 3, label: "Some" },
      { value: 4, label: "Often" },
      { value: 5, label: "Always" }
    ];

    function AboutMe({ onBack, onLogout, onAway, onboarding, onFinish, scale, onScale }) {
      const [profile, setProfile] = useState(loadProfile);
      const [saved, setSaved] = useState(false);

      const update = (field, value) => setProfile(p => ({ ...p, [field]: value }));
      const save = () => {
        // Writes locally AND syncs to Supabase when configured.
        if (DB && DB.pushProfile) DB.pushProfile(profile); else saveProfile(profile);
        if (onboarding) { onFinish && onFinish(); return; }
        setSaved(true); setTimeout(() => setSaved(false), 2000);
      };

      // Cycle a "likes" item through: null → "like" → "dislike" → null
      const cycleLike = (item) => setProfile(p => {
        const cur = p.likes?.[item];
        const next = cur === undefined || cur === null ? "like" : cur === "like" ? "dislike" : null;
        const likes = { ...(p.likes || {}) };
        if (next === null) delete likes[item]; else likes[item] = next;
        // If item is now "dislike", remove from favorites
        let favs = p.favoriteLikes || [];
        if (next !== "like") favs = favs.filter(f => f !== item);
        return { ...p, likes, favoriteLikes: favs };
      });

      // Toggle a boolean checklist (strengths, skills)
      const toggleCheck = (field, item) => setProfile(p => {
        const cur = p[field] || {};
        const next = { ...cur };
        if (next[item]) delete next[item]; else next[item] = true;
        // If unchecking, drop from favorites
        const favField = field === "strengths" ? "favoriteStrengths" : "favoriteSkills";
        let favs = p[favField] || [];
        if (!next[item]) favs = favs.filter(f => f !== item);
        return { ...p, [field]: next, [favField]: favs };
      });

      // Toggle a top-3 favorite. Capped at 3 — oldest drops off.
      const toggleFav = (favField, item, requireSelectedField, requireSelectedValue) => setProfile(p => {
        // Only allow favoriting if the item is "selected" in the parent list
        if (requireSelectedField) {
          const parent = p[requireSelectedField] || {};
          const ok = requireSelectedValue ? parent[item] === requireSelectedValue : !!parent[item];
          if (!ok) return p;
        }
        let favs = [...(p[favField] || [])];
        if (favs.includes(item)) {
          favs = favs.filter(f => f !== item);
        } else {
          favs.push(item);
          if (favs.length > 3) favs.shift();
        }
        return { ...p, [favField]: favs };
      });

      // Set wellbeing rating (1–5) for an item
      const setRating = (item, val) => setProfile(p => ({
        ...p, wellbeing: { ...(p.wellbeing || {}), [item]: val }
      }));

      // Reusable row for likes (3-state) with star
      const LikeRow = ({ item }) => {
        const state = profile.likes?.[item]; // "like" | "dislike" | undefined
        const isFav = (profile.favoriteLikes || []).includes(item);
        const bg = state === "like" ? "#E8F5E9" : state === "dislike" ? "#FFEBEE" : "#fff";
        const border = state === "like" ? "#66BB6A" : state === "dislike" ? "#EF5350" : "#eee";
        const icon = state === "like" ? "❤️" : state === "dislike" ? "✕" : "";
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <button onClick={() => cycleLike(item)} style={{
              flex: 1, textAlign: "left", background: bg, border: `2px solid ${border}`,
              borderRadius: 12, padding: "12px 14px", fontSize: 15, fontWeight: 600,
              color: "var(--dark)", cursor: "pointer", minHeight: 48,
              display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8
            }}>
              <span style={{ flex: 1 }}>{item}</span>
              <span style={{ fontSize: 18 }}>{icon}</span>
            </button>
            <button
              onClick={() => toggleFav("favoriteLikes", item, "likes", "like")}
              disabled={state !== "like"}
              style={{
                background: isFav ? "var(--amber)" : "#f5f5f5",
                border: "none", borderRadius: 12, width: 48, height: 48,
                fontSize: 22, cursor: state === "like" ? "pointer" : "default",
                opacity: state === "like" ? 1 : 0.4, flexShrink: 0
              }}>{isFav ? "⭐" : "☆"}</button>
          </div>
        );
      };

      // Reusable row for boolean checklist (strengths, skills) with star
      const CheckRow = ({ field, favField, item }) => {
        const checked = !!(profile[field] || {})[item];
        const isFav = ((profile[favField]) || []).includes(item);
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <button onClick={() => toggleCheck(field, item)} style={{
              flex: 1, textAlign: "left", background: checked ? "#E3F2FD" : "#fff",
              border: `2px solid ${checked ? "#42A5F5" : "#eee"}`,
              borderRadius: 12, padding: "12px 14px", fontSize: 15, fontWeight: 600,
              color: "var(--dark)", cursor: "pointer", minHeight: 48,
              display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8
            }}>
              <span style={{ flex: 1 }}>{item}</span>
              <span style={{ fontSize: 18 }}>{checked ? "✓" : ""}</span>
            </button>
            <button
              onClick={() => toggleFav(favField, item, field, true)}
              disabled={!checked}
              style={{
                background: isFav ? "var(--amber)" : "#f5f5f5",
                border: "none", borderRadius: 12, width: 48, height: 48,
                fontSize: 22, cursor: checked ? "pointer" : "default",
                opacity: checked ? 1 : 0.4, flexShrink: 0
              }}>{isFav ? "⭐" : "☆"}</button>
          </div>
        );
      };

      const sectionHeader = (num, title, hint) => (
        <div style={{ marginTop: 28, marginBottom: 14, paddingTop: 18, borderTop: "2px dashed #eee" }}>
          <div className="label-cap" style={{ color: "var(--flame)", marginBottom: 4 }}>Section {num} of 4</div>
          <h2 className="lilita" style={{ fontSize: 24, color: "var(--dark)", margin: "0 0 6px", lineHeight: 1.2 }}>{title}</h2>
          <p style={{ fontSize: 14, color: "#666", lineHeight: 1.4, margin: 0 }}>{hint}</p>
        </div>
      );

      const textareaStyle = { width: "100%", padding: 14, borderRadius: 14, border: "2px solid #eee", fontSize: 16, fontFamily: "inherit", resize: "vertical", minHeight: 80, background: "#fff" };
      const inputStyle = { width: "100%", padding: 14, borderRadius: 14, border: "2px solid #eee", fontSize: 16, fontFamily: "inherit", background: "#fff", boxSizing: "border-box" };

      return (
        <div className="route-enter" style={{ padding: "20px 18px 80px", maxWidth: 500, margin: "0 auto" }}>
          {!onboarding && <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 16, fontWeight: 700, color: "var(--deep-red)", cursor: "pointer", marginBottom: 12, padding: 0 }}>‹ Back</button>}
          {onboarding && <div className="label-cap" style={{ color: "var(--flame)", marginBottom: 6 }}>Welcome to Mosaic 👋</div>}
          <h1 className="lilita" style={{ fontSize: 32, margin: "0 0 6px", lineHeight: 1.1, color: "var(--dark)" }}>{onboarding ? "Let's set up your profile" : "About Me"}</h1>
          <p style={{ color: "#666", fontSize: 15, marginBottom: 18 }}>Help us get to know you. Tap items to mark them, star your top 3 in each section.{onboarding ? " You can change this anytime in the Me tab." : ""}</p>

          {!onboarding && onAway && (
            <button onClick={onAway} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, background: "#fff", border: "2px solid var(--peach)", borderRadius: 16, padding: "14px 16px", cursor: "pointer", textAlign: "left", marginBottom: 18, boxShadow: "var(--shadow-card)" }}>
              <span style={{ fontSize: 26 }}>✈️</span>
              <span style={{ flex: 1 }}>
                <span style={{ display: "block", fontWeight: 800, fontSize: 16, color: "var(--dark)" }}>I'll be away</span>
                <span style={{ display: "block", fontSize: 13, color: "#777" }}>Tell us the days you can't come in</span>
              </span>
              <span style={{ color: "#ccc", fontSize: 20 }}>›</span>
            </button>
          )}

          {/* Text size (magnification) — stacked so it never overflows when zoomed up */}
          {!onboarding && onScale && (
            <div style={{ background: "#fff", borderRadius: 16, padding: "14px 16px", boxShadow: "var(--shadow-card)", marginBottom: 18 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ fontSize: 22 }}>🔎</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>Text size</div>
                  <div style={{ fontSize: 13, color: "#777" }}>Make everything bigger or smaller</div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button aria-label="Smaller" onClick={() => onScale(scale - 0.1)} disabled={scale <= 0.9} style={{ flex: 1, background: scale <= 0.9 ? "#f0f0f0" : "var(--gradient)", color: scale <= 0.9 ? "#bbb" : "#fff", border: "none", borderRadius: 12, height: 52, fontSize: 26, fontWeight: 800, cursor: scale <= 0.9 ? "default" : "pointer", lineHeight: 1 }}>−</button>
                <div style={{ minWidth: 64, textAlign: "center", fontWeight: 800, fontSize: 17, fontVariantNumeric: "tabular-nums" }}>{Math.round((scale || 1) * 100)}%</div>
                <button aria-label="Bigger" onClick={() => onScale(scale + 0.1)} disabled={scale >= 1.6} style={{ flex: 1, background: scale >= 1.6 ? "#f0f0f0" : "var(--gradient)", color: scale >= 1.6 ? "#bbb" : "#fff", border: "none", borderRadius: 12, height: 52, fontSize: 26, fontWeight: 800, cursor: scale >= 1.6 ? "default" : "pointer", lineHeight: 1 }}>+</button>
              </div>
            </div>
          )}

          {/* Name & date */}
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6, color: "var(--dark)" }}>Name</label>
            <input type="text" value={profile.name || ""} onChange={e => update("name", e.target.value)} placeholder="Your name" style={inputStyle} />
          </div>
          <div style={{ marginBottom: 8 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6, color: "var(--dark)" }}>Date</label>
            <input type="date" value={profile.date || ""} onChange={e => update("date", e.target.value)} style={inputStyle} />
          </div>

          {/* Section 1 — Likes & Dislikes */}
          {sectionHeader(1, "Likes & Dislikes", "Tap each one — once for like ❤️, twice for dislike ✕. Star ⭐ your 3 favourite things.")}
          {LIKES_OPTIONS.map(item => <LikeRow key={item} item={item} />)}
          <div style={{ marginTop: 12 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6 }}>Other hobbies & interests</label>
            <textarea value={profile.otherHobbies || ""} onChange={e => update("otherHobbies", e.target.value)} placeholder="Anything else you love..." rows={3} style={textareaStyle} />
          </div>

          {/* Section 2 — Personal Strengths */}
          {sectionHeader(2, "About Me", "Tap each sentence that describes you. Star ⭐ the 3 that best describe you.")}
          {STRENGTHS_OPTIONS.map(item => <CheckRow key={item} field="strengths" favField="favoriteStrengths" item={item} />)}
          <div style={{ marginTop: 12 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6 }}>Other strengths</label>
            <textarea value={profile.otherStrengths || ""} onChange={e => update("otherStrengths", e.target.value)} placeholder="Other things that describe you..." rows={3} style={textareaStyle} />
          </div>

          {/* Section 3 — I'm Good At */}
          {sectionHeader(3, "I'm Good At", "Tap everything you're good at. Star ⭐ the 3 you do best.")}
          {SKILLS_OPTIONS.map(item => <CheckRow key={item} field="skills" favField="favoriteSkills" item={item} />)}
          <div style={{ marginTop: 12 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6 }}>Other things I'm good at</label>
            <textarea value={profile.otherSkills || ""} onChange={e => update("otherSkills", e.target.value)} placeholder="Other skills..." rows={3} style={textareaStyle} />
          </div>

          {/* Section 4 — Personal Wellbeing */}
          {sectionHeader(4, "Personal Wellbeing", "Thinking about the past 2 weeks, tap how often each was true for you.")}
          {WELLBEING_OPTIONS.map(item => {
            const cur = (profile.wellbeing || {})[item];
            return (
              <div key={item} style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 10, border: "2px solid #eee" }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: "var(--dark)", marginBottom: 10 }}>{item}</div>
                <div style={{ display: "flex", gap: 6 }}>
                  {WELLBEING_SCALE.map(s => (
                    <button key={s.value} onClick={() => setRating(item, s.value)} style={{
                      flex: 1, background: cur === s.value ? "var(--gradient)" : "#f5f5f5",
                      color: cur === s.value ? "#fff" : "var(--dark)",
                      border: "none", borderRadius: 10, padding: "10px 4px",
                      fontSize: 13, fontWeight: 700, cursor: "pointer", minHeight: 56,
                      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2
                    }}>
                      <span style={{ fontSize: 18, fontWeight: 900 }}>{s.value}</span>
                      <span style={{ fontSize: 10, opacity: 0.85 }}>{s.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}

          <button onClick={save} style={{ width: "100%", background: "var(--gradient)", color: "#fff", border: "none", borderRadius: 18, padding: 18, fontSize: 19, cursor: "pointer", boxShadow: "var(--shadow-warm)", minHeight: 56, fontFamily: "'Lilita One', system-ui, sans-serif", letterSpacing: "0.02em", marginTop: 24 }}>
            {onboarding ? "Save & continue →" : (saved ? "Saved ✓" : "Save")}
          </button>

          {onLogout && !onboarding && (
            <button onClick={onLogout} style={{ width: "100%", background: "none", color: "#999", border: "none", padding: 16, fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 8 }}>
              Log out
            </button>
          )}
        </div>
      );
    }

    // ============================================================
    // AWAY MANAGER — participant tells staff when they'll be away
    // ============================================================
    function AwayManager({ onBack }) {
      const [list, setList] = useState(null);
      const [start, setStart] = useState("");
      const [end, setEnd] = useState("");
      const [note, setNote] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);

      const load = async () => { const l = DB && DB.away ? await DB.away.list() : []; setList(l || []); };
      useEffect(() => { load(); }, []);

      const add = async () => {
        setErr("");
        if (!start) { setErr("Pick a start date."); return; }
        if (end && end < start) { setErr("The end date can't be before the start date."); return; }
        setBusy(true);
        await DB.away.add(start, end || start, note.trim());
        setStart(""); setEnd(""); setNote("");
        await load(); setBusy(false);
      };
      const remove = async (id) => { await DB.away.remove(id); load(); };

      const inputStyle = { width: "100%", padding: 14, borderRadius: 14, border: "2px solid #eee", fontSize: 16, fontFamily: "inherit", background: "#fff", boxSizing: "border-box" };
      const upcoming = (list || []).slice().sort((a, b) => (a.start || "").localeCompare(b.start || ""));

      return (
        <div className="route-enter" style={{ padding: "20px 18px 100px", maxWidth: 500, margin: "0 auto" }}>
          <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 16, fontWeight: 700, color: "var(--deep-red)", cursor: "pointer", marginBottom: 12, padding: 0 }}>‹ Back</button>
          <h1 className="lilita" style={{ fontSize: 32, margin: "0 0 6px", lineHeight: 1.1, color: "var(--dark)" }}>I'll be away ✈️</h1>
          <p style={{ color: "#666", fontSize: 15, marginBottom: 20 }}>Let us know the days you won't be coming in — one day, or a range. Your team will see it.</p>

          <div style={{ background: "#fff", borderRadius: 18, padding: 18, boxShadow: "var(--shadow-card)", marginBottom: 22 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6 }}>From</label>
            <input type="date" value={start} onChange={e => setStart(e.target.value)} style={{ ...inputStyle, marginBottom: 12 }} />
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6 }}>To <span style={{ color: "#aaa", fontWeight: 500 }}>(leave blank for one day)</span></label>
            <input type="date" value={end} min={start || undefined} onChange={e => setEnd(e.target.value)} style={{ ...inputStyle, marginBottom: 12 }} />
            <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6 }}>Note <span style={{ color: "#aaa", fontWeight: 500 }}>(optional)</span></label>
            <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="e.g. family holiday" style={{ ...inputStyle, marginBottom: 14 }} />
            {err && <div style={{ color: "var(--deep-red)", fontSize: 14, fontWeight: 600, marginBottom: 12 }}>{err}</div>}
            <button onClick={add} disabled={busy || !start} style={{ width: "100%", background: busy || !start ? "#ebebeb" : "var(--gradient)", color: busy || !start ? "#aaa" : "#fff", border: "none", borderRadius: 16, padding: 16, fontSize: 17, fontWeight: 800, cursor: busy || !start ? "default" : "pointer", minHeight: 56, fontFamily: "'Lilita One', system-ui, sans-serif" }}>
              {busy ? "Saving…" : "Add away time"}
            </button>
          </div>

          <h2 className="label-cap" style={{ color: "var(--flame)", marginBottom: 10 }}>Your away days</h2>
          {list === null ? (
            <div style={{ textAlign: "center", color: "#bbb", padding: 20 }}>Loading…</div>
          ) : upcoming.length === 0 ? (
            <div style={{ textAlign: "center", color: "#aaa", padding: "28px 20px", fontSize: 15 }}>None yet — you're all in! 🎉</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {upcoming.map(p => (
                <div key={p.id} style={{ background: "#fff", borderRadius: 16, padding: "14px 16px", boxShadow: "var(--shadow-card)", display: "flex", alignItems: "center", gap: 12, borderLeft: "5px solid var(--amber)" }}>
                  <div style={{ fontSize: 24 }}>✈️</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{fmtAwayRange(p)}</div>
                    {p.note && <div style={{ fontSize: 13, color: "#777", marginTop: 2 }}>{p.note}</div>}
                  </div>
                  <button aria-label="Remove" onClick={() => remove(p.id)} style={{ background: "rgba(232,48,0,0.1)", color: "var(--deep-red)", border: "none", borderRadius: 10, width: 40, height: 40, fontSize: 16, fontWeight: 800, cursor: "pointer", flexShrink: 0 }}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // SERVICE REQUEST (feature 09)
    // ============================================================
    const SERVICE_OPTIONS = [
      { type: "doctor",      emoji: "🩺", label: "Doctor's appointment" },
      { type: "cleaning",    emoji: "🧽", label: "House cleaning" },
      { type: "garden",      emoji: "🪴", label: "Garden / watering" },
      { type: "overwhelmed", emoji: "😮‍💨", label: "Feeling overwhelmed" },
      { type: "respite",     emoji: "🛌", label: "Respite request" },
      { type: "other",       emoji: "🤝", label: "Something else" },
    ];

    function ServiceRequest({ onBack }) {
      const [picked, setPicked] = useState(null);
      const [detail, setDetail] = useState("");
      const [submitted, setSubmitted] = useState(false);

      const submit = () => {
        // Persists locally + (when live) to Supabase and pings staff via /api/notify.
        if (DB && DB.createServiceRequest) {
          DB.createServiceRequest(picked.type, detail);
        } else {
          const all = loadRequests();
          all.push({ id: Date.now(), type: picked.type, detail, status: "open", created_at: new Date().toISOString() });
          saveRequests(all);
        }
        setSubmitted(true);
      };

      if (submitted) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, textAlign: "center" }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>🤗</div>
            <h2 className="lilita" style={{ fontSize: 34, margin: "0 0 10px", color: "var(--dark)", lineHeight: 1.1 }}>We got it.</h2>
            <p style={{ fontSize: 16, color: "#666", margin: "0 0 32px" }}>Someone will be in touch.</p>
            <button onClick={onBack} style={{ background: "var(--deep-red)", color: "#fff", border: "none", borderRadius: 18, padding: "16px 40px", fontSize: 17, fontWeight: 800, cursor: "pointer", minHeight: 56 }}>Done</button>
          </div>
        );
      }

      if (picked) {
        return (
          <div className="route-enter" style={{ padding: "20px 18px 80px", maxWidth: 500, margin: "0 auto" }}>
            <button onClick={() => setPicked(null)} style={{ background: "none", border: "none", fontSize: 16, fontWeight: 700, color: "var(--deep-red)", cursor: "pointer", marginBottom: 12, padding: 0 }}>‹ Back</button>
            <div style={{ fontSize: 48, marginBottom: 12 }}>{picked.emoji}</div>
            <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 18px" }}>{picked.label}</h1>
            <label style={{ display: "block", fontWeight: 700, fontSize: 15, marginBottom: 6 }}>Anything else we should know?</label>
            <textarea
              value={detail}
              onChange={e => setDetail(e.target.value)}
              placeholder="Optional — type or leave blank"
              rows={4}
              style={{ width: "100%", padding: 14, borderRadius: 14, border: "2px solid #eee", fontSize: 16, fontFamily: "inherit", resize: "vertical", marginBottom: 18, minHeight: 56 }}
            />
            <button onClick={submit} style={{ width: "100%", background: "var(--deep-red)", color: "#fff", border: "none", borderRadius: 18, padding: 18, fontSize: 17, fontWeight: 800, cursor: "pointer", boxShadow: "0 4px 20px rgba(232,48,0,0.35)", minHeight: 56 }}>
              Send Request
            </button>
          </div>
        );
      }

      return (
        <div className="route-enter" style={{ padding: "20px 18px 80px", maxWidth: 500, margin: "0 auto" }}>
          <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 16, fontWeight: 700, color: "var(--deep-red)", cursor: "pointer", marginBottom: 12, padding: 0 }}>‹ Back</button>
          <h1 className="lilita" style={{ fontSize: 32, margin: "0 0 6px", lineHeight: 1.1, color: "var(--dark)" }}>Need help? 💛</h1>
          <p style={{ color: "#666", fontSize: 15, marginBottom: 22 }}>Tap what you need.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {SERVICE_OPTIONS.map(opt => (

    // ============================================================
    // NIGHT-BEFORE SMS PREVIEW (feature 10)
    // Production: Vercel cron at 19:00 local hits a serverless route that
    // queries tomorrow's bookings, formats this message, sends via Twilio,
    // and inserts into notifications_log. This component shows the text that
    // WOULD be sent so the owner can sanity-check copy before wiring Twilio.
    // ============================================================
    function buildSmsForBooking(participantName, activity, dateIso) {
      const blockLabel = blockRangeLabel(activity);
      let msg = `Tomorrow: ${participantName} wants to ${activity.name} from ${blockLabel}.`;
      if (activity.bring_money) {
        msg += ` You'll need to bring $${activity.bring_money} — Mosaic doesn't pay for client lunches.`;
      }
      return msg;
    }

    function fmtTime(iso) {
      try { return new Date(iso).toLocaleTimeString("en-AU", { hour: "numeric", minute: "2-digit" }); }
      catch { return ""; }
    }

    function seedChat() {
      const participantName = (sessionName().trim().split(" ")[0]) || "there";
      const bookings = loadBookings();
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tIso = isoKey(tomorrow);
      const list = (bookings[tIso] || []).filter(b => b.status === "pending" || b.status === "confirmed");

      const now = new Date();
      const msgs = [{
        id: 1, from: "them", at: new Date(now.getTime() - 60000).toISOString(),
        text: `Hi ${participantName}! 👋 Here's what's coming up tomorrow.`
      }];
      list.forEach((bk, i) => {
        const act = ACTIVITIES.find(a => a.id === bk.activityId);
        if (!act) return;
        msgs.push({
          id: 2 + i, from: "them",
          at: new Date(now.getTime() - 50000 + i * 1000).toISOString(),
          text: buildSmsForBooking(participantName, act, tIso)
        });
      });
      if (list.length === 0) {
        msgs.push({
          id: 2, from: "them", at: new Date().toISOString(),
          text: "Nothing booked for tomorrow yet — pop into Edit week and pick something! ✏️"
        });
      }
      return msgs;
    }

    function ChatScreen({ onBack }) {
      const live = DB && DB.ENABLED;
      const [messages, setMessages] = useState(() => loadChat() || seedChat());
      const [draft, setDraft] = useState("");
      const [undoId, setUndoId] = useState(null); // last sent msg that can be unsent
      const scrollerRef = React.useRef(null);
      const undoTimer = React.useRef(null);
      const replyTimer = React.useRef(null);
      useEffect(() => () => { clearTimeout(undoTimer.current); clearTimeout(replyTimer.current); }, []);

      // Live mode: pull the real thread + poll for staff replies.
      useEffect(() => {
        if (!live) return;
        let alive = true;
        const refresh = async () => {
          const m = await DB.listMessages();
          if (alive && m) setMessages(m.length ? m : seedChat());
        };
        refresh();
        const t = setInterval(refresh, 6000);
        return () => { alive = false; clearInterval(t); };
      }, [live]);

      useEffect(() => { if (!live) saveChat(messages); }, [messages, live]);
      useEffect(() => {
        if (scrollerRef.current) scrollerRef.current.scrollTop = scrollerRef.current.scrollHeight;
      }, [messages]);

      const send = () => {
        const text = draft.trim();
        if (!text) return;
        const mid = Date.now();
        setMessages(m => [...m, { id: mid, from: "me", at: new Date().toISOString(), text }]);
        setDraft("");
        // Allow "unsend" for a short window after sending.
        setUndoId(mid);
        clearTimeout(undoTimer.current);
        undoTimer.current = setTimeout(() => setUndoId(null), 10000);
        if (live) {
          // Adopt the real server id so undo can delete the right row.
          DB.sendMessage(text).then(res => {
            if (res && res.id) { setMessages(m => m.map(x => x.id === mid ? { ...x, id: res.id } : x)); setUndoId(cur => cur === mid ? res.id : cur); }
          });
          return;
        }
        // Demo mode: friendly auto-reply stub so the chat feels alive.
        clearTimeout(replyTimer.current);
        replyTimer.current = setTimeout(() => {
          setMessages(m => [...m, { id: Date.now() + 1, from: "them", at: new Date().toISOString(), text: "Thanks! We'll get back to you soon 💛" }]);
        }, 1500);
      };

      const undoSend = (id) => {
        setMessages(m => m.filter(x => x.id !== id));
        setUndoId(null);
        clearTimeout(undoTimer.current);
        clearTimeout(replyTimer.current); // cancel the demo auto-reply too
        if (live && DB.deleteMessage) DB.deleteMessage(id);
      };

      const onKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "#F7F5F2" }}>
          {/* Chat header — fixed top */}
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, background: "#fff", borderBottom: "1px solid #eee", padding: "10px 14px", display: "flex", alignItems: "center", gap: 12, zIndex: 20 }}>
            <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 22, color: "var(--deep-red)", cursor: "pointer", padding: "4px 8px", minWidth: 36 }}>‹</button>
            <div style={{ width: 40, height: 40, borderRadius: "50%", background: "var(--gradient)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontFamily: "'Lilita One', system-ui, sans-serif", flexShrink: 0, boxShadow: "var(--shadow-warm)" }}>M</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 800, fontSize: 16, color: "#1a1a1a" }}>Mosaic Team</div>
              <div style={{ fontSize: 12, color: "#27AE60", display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#27AE60", display: "inline-block" }} />
                Active now
              </div>
            </div>
          </div>

          {/* Messages — scrolls between fixed header and fixed composer */}
          <div ref={scrollerRef} style={{ position: "absolute", top: 60, left: 0, right: 0, bottom: 70, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "14px 12px", display: "flex", flexDirection: "column", gap: 4 }}>
            {messages.map((msg, i) => {
              const mine = msg.from === "me";
              const prev = messages[i - 1];
              const next = messages[i + 1];
              const grouped = prev && prev.from === msg.from && (new Date(msg.at) - new Date(prev.at) < 60000);
              const last = !next || next.from !== msg.from;
              const showTime = !next || next.from !== msg.from || (new Date(next.at) - new Date(msg.at) >= 60000);

              const bubbleColor = mine ? "var(--deep-red)" : "#fff";
              const textColor = mine ? "#fff" : "#1a1a1a";
              const radius = mine
                ? `20px ${grouped ? "6px" : "20px"} ${last ? "20px" : "6px"} 20px`
                : `${grouped ? "6px" : "20px"} 20px 20px ${last ? "20px" : "6px"}`;

              return (
                <div key={msg.id} style={{ display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start", marginTop: grouped ? 0 : 6 }}>
                  <div style={{
                    background: bubbleColor, color: textColor,
                    padding: "10px 14px", borderRadius: radius,
                    maxWidth: "78%", fontSize: 15, lineHeight: 1.4,
                    boxShadow: mine ? "none" : "0 1px 2px rgba(0,0,0,0.06)",
                    border: mine ? "none" : "1px solid #eee",
                    wordBreak: "break-word", whiteSpace: "pre-wrap"
                  }}>
                    {msg.text}
                  </div>
                  {showTime && (
                    <div style={{ fontSize: 10, color: "#999", margin: "4px 8px 2px", fontWeight: 600 }}>
                      {fmtTime(msg.at)}
                    </div>
                  )}
                  {mine && msg.id === undoId && (
                    <button onClick={() => undoSend(msg.id)} style={{ background: "none", border: "none", color: "var(--deep-red)", fontSize: 13, fontWeight: 800, cursor: "pointer", margin: "0 8px 2px", padding: "2px 0" }}>
                      Undo send ↩
                    </button>
                  )}
                </div>
              );
            })}
          </div>

          {/* Composer — floating, always visible */}
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: "1px solid #eee", padding: "10px 12px calc(10px + env(safe-area-inset-bottom))", display: "flex", gap: 8, alignItems: "flex-end", zIndex: 20, boxShadow: "0 -2px 12px rgba(0,0,0,0.06)" }}>
            <textarea
              value={draft}
              onChange={e => setDraft(e.target.value)}
              onKeyDown={onKey}
              placeholder="Type a message..."
              rows={1}
              style={{ flex: 1, padding: "10px 14px", borderRadius: 22, border: "1px solid #eee", background: "#F0F2F5", fontSize: 16, fontFamily: "inherit", resize: "none", maxHeight: 120, outline: "none", lineHeight: 1.4 }}
            />
            <button onClick={send} disabled={!draft.trim()} style={{
              background: draft.trim() ? "var(--deep-red)" : "#f0f0f0",
              color: draft.trim() ? "#fff" : "#ccc",
              border: "none", borderRadius: "50%", width: 44, height: 44,
              fontSize: 20, cursor: draft.trim() ? "pointer" : "default",
              flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center"
            }}>➤</button>
          </div>
        </div>
      );
    }

    // ============================================================
    // SCHEDULER (features 01, 02, 06, 08)
    // ============================================================
    function Scheduler({ onSaved }) {
      const [weekOffset, setWeekOffset] = useState(0);
      const [selectedDay, setSelectedDay] = useState(1); // one day in view at a time (1=Mon … 5=Fri)
      const [bookings, setBookings] = useState(loadBookings); // { isoDate: [{activityId, status, addedAt, ...}] }
      const [toast, setToast] = useState(null);
      const [star, setStar] = useState(null);
      const [confirm, setConfirm] = useState(null);    // {activity, dateIso, anchor}
      const [conflict, setConflict] = useState(null);  // {existingActivity, candidateActivity}
      const [cancelAsk, setCancelAsk] = useState(null); // {activity, dateIso, late}
      const [awaySet, setAwaySet] = useState(() => new Set());
      const myMode = sessionMode();
      const [modeTab, setModeTab] = useState(myMode === "one_on_one" ? "one_on_one" : "program");

      useEffect(() => {
        let alive = true;
        (async () => { if (DB && DB.away) { const l = await DB.away.list(); if (alive) setAwaySet(expandAway(l)); } })();
        return () => { alive = false; };
      }, []);
      const showModeTabs = myMode === "both";

      useEffect(() => { saveBookings(bookings); }, [bookings]);

      const weekDates = useMemo(() => getWeekDates(weekOffset), [weekOffset]);
      const weekLabel = `${fmt(weekDates[0])} – ${fmt(weekDates[4])}`;
      const weekLocked = isWeekLocked(weekDates[0]);

      const dayIso = (dayIdx) => isoKey(weekDates[dayIdx - 1]);
      const dayBookings = (dayIdx) => bookings[dayIso(dayIdx)] || [];

      // Toast supports an optional inline action (e.g. Undo). Longer dwell when actionable.
      const showToast = (msg, action) => { setToast({ msg, action }); setTimeout(() => setToast(null), action ? 5500 : 3200); };

      const showStar = (anchor) => {
        if (!anchor) return;
        const id = Date.now();
        setStar({ id, x: anchor.x, y: anchor.y });
        setTimeout(() => setStar(null), 1100);
      };

      // Tap "+ Add" → confirm modal
      const requestAdd = (activity, dayIdx, el) => {
        const dateIso = dayIso(dayIdx);
        const existing = bookings[dateIso] || [];
        if (existing.some(b => b.activityId === activity.id)) return;

        // Gentle heads-up if they marked themselves away that day (still allowed).
        if (awaySet.has(dateIso)) showToast("Heads up — you said you'd be away this day.");

        // Enforce the per-day cap (was only cosmetic before).
        const activeCount = existing.filter(b => b.status === "pending" || b.status === "confirmed").length;
        if (activeCount >= MAX_SESSIONS_PER_DAY) {
          showToast(`You can pick up to ${MAX_SESSIONS_PER_DAY} activities a day.`);
          return;
        }

        const conflictBk = findConflict(existing, activity);
        if (conflictBk) {
          const ex = ACTIVITIES.find(a => a.id === conflictBk.activityId);
          setConflict({ existingActivity: ex, candidateActivity: activity });
          return;
        }
        const rect = el.getBoundingClientRect();
        setConfirm({ activity, dateIso, anchor: { x: rect.left + rect.width / 2, y: rect.top } });
      };

      const confirmAdd = () => {
        const { activity, dateIso, anchor } = confirm;
        setBookings(prev => ({
          ...prev,
          [dateIso]: [...(prev[dateIso] || []), {
            activityId: activity.id,
            status: "pending",
            addedAt: new Date().toISOString(),
          }]
        }));
        showStar(anchor);
        setConfirm(null);
        // Instant undo for accidental adds — removes the just-added booking, no charge.
        showToast(`Added ${activity.name} ✓`, { label: "Undo", fn: () => doRemove(activity.id, dateIso, false) });
        // Auto-advance to the next day once this day is full (the daily cap).
        const filled = (bookings[dateIso] || []).filter(b => b.status === "pending" || b.status === "confirmed").length + 1;
        if (filled >= MAX_SESSIONS_PER_DAY && selectedDay < 5) {
          setTimeout(() => setSelectedDay(d => Math.min(5, d + 1)), 850);
        }
      };

      // Tap × on a booked card → maybe late-cancel modal
      const requestRemove = (activityId, dayIdx) => {
        const dateIso = dayIso(dayIdx);
        // A locked week is genuinely locked now — no silent removals.
        if (weekLocked) { showToast("This week is locked — tap Chat to ask us to change it."); return; }
        const activity = ACTIVITIES.find(a => a.id === activityId);
        if (isLateCancel(dateIso) && !activity?.practitioner_led) {
          setCancelAsk({ activity, dateIso, late: true });
        } else {
          doRemove(activityId, dateIso, false);
        }
      };

      const doRemove = (activityId, dateIso, late) => {
        setBookings(prev => {
          const list = prev[dateIso] || [];
          if (late) {
            return {
              ...prev,
              [dateIso]: list.map(b => b.activityId === activityId
                ? { ...b, status: "late_cancelled", cancel_charge: true, cancelled_at: new Date().toISOString() }
                : b)
            };
          }
          return { ...prev, [dateIso]: list.filter(b => b.activityId !== activityId) };
        });
        setCancelAsk(null);
        // Sync cancellation/late-cancel to staff (after state commits to localStorage).
        if (DB && DB.pushBookings) setTimeout(() => DB.pushBookings(), 120);
      };

      const totalSessions = Object.values(bookings).flat().filter(b => b.status === "pending" || b.status === "confirmed").length;
      const activeMode = showModeTabs ? modeTab : myMode;
      const availableForDay = useMemo(() => {
        if (!selectedDay) return [];
        return ACTIVITIES.filter(a =>
          a.days.includes(selectedDay) && (a.mode === activeMode || a.mode === "both")
        );
      }, [selectedDay, activeMode]);

      return (
        <div className="route-enter" style={{ background: "var(--off-white)", minHeight: "100vh", color: "var(--dark)" }}>
          <style>{`
            @keyframes starMain {
              0%   { opacity: 0; transform: translate(-50%, 0px) scale(0.3) rotate(-10deg); }
              25%  { opacity: 1; transform: translate(-50%, -30px) scale(1.2) rotate(6deg); }
              60%  { opacity: 1; transform: translate(-50%, -60px) scale(1) rotate(-3deg); }
              100% { opacity: 0; transform: translate(-50%, -110px) scale(0.7) rotate(8deg); }
            }
            @keyframes starLeft  { 0% { opacity:0; transform: translate(0,0) scale(0.2);} 30% { opacity:1; transform: translate(-22px,-25px) scale(1) rotate(-15deg);} 100% { opacity:0; transform: translate(-50px,-105px) scale(0.4) rotate(-35deg);} }
            @keyframes starRight { 0% { opacity:0; transform: translate(0,0) scale(0.2);} 35% { opacity:1; transform: translate(20px,-18px) scale(1) rotate(12deg);} 100% { opacity:0; transform: translate(44px,-100px) scale(0.4) rotate(35deg);} }
          `}</style>

          {star && (
            <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 200 }}>
              <div style={{ position: "absolute", left: star.x, top: star.y, fontSize: 48, lineHeight: 1, animation: "starMain 1.05s cubic-bezier(0.22,1,0.36,1) forwards", filter: "drop-shadow(0 2px 10px rgba(232,48,0,0.55))" }}>⭐</div>
              <div style={{ position: "absolute", left: star.x, top: star.y, fontSize: 24, lineHeight: 1, animation: "starLeft 1.05s cubic-bezier(0.22,1,0.36,1) forwards", animationDelay: "60ms" }}>⭐</div>
              <div style={{ position: "absolute", left: star.x, top: star.y, fontSize: 22, lineHeight: 1, animation: "starRight 1.05s cubic-bezier(0.22,1,0.36,1) forwards", animationDelay: "30ms" }}>⭐</div>
            </div>
          )}

          {toast && (
            <div style={{ position: "fixed", bottom: 96, left: "50%", transform: "translateX(-50%)", background: "#1a1a1a", color: "#fff", borderRadius: 18, padding: "12px 16px 12px 22px", zIndex: 100, boxShadow: "0 4px 24px rgba(0,0,0,0.25)", fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", gap: 14, maxWidth: "calc(100vw - 32px)" }}>
              <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{toast.msg}</span>
              {toast.action && (
                <button
                  onClick={() => { toast.action.fn(); setToast(null); }}
                  style={{ background: "var(--amber)", color: "var(--dark)", border: "none", borderRadius: 12, padding: "8px 16px", fontSize: 14, fontWeight: 800, cursor: "pointer", flexShrink: 0, minHeight: 40 }}
                >
                  {toast.action.label}
                </button>
              )}
            </div>
          )}

          {/* Header — animated lava bar + week nav */}
          <div className="lava" style={{ padding: "16px 20px", color: "#fff" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.15)", backdropFilter: "blur(8px)", borderRadius: 16, padding: "10px 16px" }}>
              <button onClick={() => { setWeekOffset(w => w - 1); setSelectedDay(1); }} className="btn" style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", width: 36, height: 36, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
              <div style={{ textAlign: "center" }}>
                <div className="label-cap" style={{ opacity: 0.75, marginBottom: 2 }}>Week of</div>
                <div className="bebas" style={{ fontSize: 20 }}>{weekLabel}</div>
              </div>
              <button onClick={() => { setWeekOffset(w => w + 1); setSelectedDay(1); }} className="btn" style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", width: 36, height: 36, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
            </div>
          </div>

          <div style={{ padding: "18px 16px 40px", maxWidth: 520, margin: "0 auto" }}>
            {weekLocked && (
              <div style={{ background: "var(--peach)", border: "2px solid var(--amber)", borderRadius: 14, padding: "12px 14px", marginBottom: 16, fontSize: 14, color: "var(--dark)", fontWeight: 600 }}>
                🔒 This week is locked. Tap Chat to ask about a change.
              </div>
            )}

            {showModeTabs && (
              <div style={{ display: "flex", background: "#fff", borderRadius: 14, padding: 4, marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                {[{ id: "program", label: "Programs", emoji: "👥" }, { id: "one_on_one", label: "1:1 Support", emoji: "🤝" }].map(t => (
                  <button key={t.id} onClick={() => { setModeTab(t.id); setSelectedDay(1); }} style={{
                    flex: 1, background: modeTab === t.id ? "var(--deep-red)" : "transparent",
                    color: modeTab === t.id ? "#fff" : "#666",
                    border: "none", borderRadius: 11, padding: "12px 8px",
                    fontSize: 14, fontWeight: 800, cursor: "pointer", minHeight: 56,
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 6
                  }}>
                    <span style={{ fontSize: 18 }}>{t.emoji}</span> {t.label}
                  </button>
                ))}
              </div>
            )}

            {/* Day stepper — one day at a time */}
            {(() => {
              const dayAway = awaySet.has(isoKey(weekDates[selectedDay - 1]));
              const stepBtn = (on) => ({ background: "#fff", border: "1px solid #eee", color: "var(--deep-red)", fontSize: 24, width: 48, height: 48, borderRadius: 14, cursor: on ? "pointer" : "default", flexShrink: 0, boxShadow: "var(--shadow-card)" });
              return (
                <>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                    <button onClick={() => setSelectedDay(d => Math.max(1, d - 1))} disabled={selectedDay <= 1} style={{ ...stepBtn(selectedDay > 1), opacity: selectedDay <= 1 ? 0.35 : 1 }}>‹</button>
                    <div style={{ textAlign: "center", flex: 1 }}>
                      <div className="lilita" style={{ fontSize: 30, color: "var(--dark)", lineHeight: 1 }}>{DAY_FULL[selectedDay - 1]}</div>
                      <div style={{ fontSize: 13, color: "#888", marginTop: 3 }}>{fmt(weekDates[selectedDay - 1])}{dayAway ? "  ·  ✈️ away" : ""}</div>
                    </div>
                    <button onClick={() => setSelectedDay(d => Math.min(5, d + 1))} disabled={selectedDay >= 5} style={{ ...stepBtn(selectedDay < 5), opacity: selectedDay >= 5 ? 0.35 : 1 }}>›</button>
                  </div>
                  <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 18 }}>
                    {[1, 2, 3, 4, 5].map(d => {
                      const has = dayBookings(d).filter(b => b.status === "pending" || b.status === "confirmed").length > 0;
                      const cur = d === selectedDay;
                      return <button key={d} onClick={() => setSelectedDay(d)} aria-label={DAY_FULL[d - 1]} style={{ width: cur ? 28 : 12, height: 12, borderRadius: 7, border: "none", cursor: "pointer", padding: 0, background: cur ? "var(--deep-red)" : (has ? "var(--amber)" : "#e7ded2"), transition: "all .25s" }} />;
                    })}
                  </div>
                </>
              );
            })()}

            {/* The day's activities — one big focused card list */}
            {availableForDay.length === 0 ? (
              <div style={{ textAlign: "center", padding: "48px 20px", color: "#aaa", fontSize: 16 }}>😴 Nothing on {DAY_FULL[selectedDay - 1]}.</div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 22 }}>
                {availableForDay.map(act => {
                  const alreadyBooked = dayBookings(selectedDay).some(b => b.activityId === act.id && (b.status === "pending" || b.status === "confirmed"));
                  const blockLabel = blockRangeLabel(act);
                  return (
                    <div key={act.id} style={{ background: "#fff", borderRadius: 20, padding: "16px 18px", boxShadow: alreadyBooked ? "0 6px 20px rgba(232,48,0,0.14)" : "var(--shadow-card)", border: alreadyBooked ? `2.5px solid ${act.color}` : "1px solid #eee", display: "flex", alignItems: "center", gap: 14, transition: "all 0.2s" }}>
                      <div style={{ width: 60, height: 60, borderRadius: 18, background: act.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, flexShrink: 0 }}>{act.emoji}</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 800, fontSize: 17 }}>{act.name}</div>
                        <div style={{ fontSize: 13, color: "#999", marginTop: 3 }}>
                          {blockLabel}
                          {act.location && <span style={{ marginLeft: 8, background: "#f0f0f0", color: "#555", borderRadius: 8, padding: "1px 8px", fontSize: 11, fontWeight: 600 }}>{act.location}</span>}
                        </div>
                        <span style={{ background: act.color + "20", color: act.color, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700, marginTop: 6, display: "inline-block" }}>{act.category}</span>

                      {alreadyBooked ? (
                        <button onClick={() => requestRemove(act.id, selectedDay)} disabled={weekLocked} style={{ background: weekLocked ? "#f0f0f0" : "#FFEBEE", color: weekLocked ? "#999" : "var(--deep-red)", border: weekLocked ? "none" : "2px solid #FFCDD2", borderRadius: 14, padding: "12px 14px", fontWeight: 800, fontSize: 14, cursor: weekLocked ? "default" : "pointer", flexShrink: 0, minWidth: 92, minHeight: 60, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", lineHeight: 1.2 }}>
                          <span style={{ fontSize: 12, color: weekLocked ? "#999" : "#27AE60", fontWeight: 700 }}>✓ Added</span>
                          <span>{weekLocked ? "🔒" : "Undo ↩"}</span>

                      ) : (
                        <button onClick={(e) => requestAdd(act, selectedDay, e.currentTarget)} disabled={weekLocked} style={{ background: weekLocked ? "#ddd" : "var(--deep-red)", color: weekLocked ? "#999" : "#fff", border: "none", borderRadius: 14, padding: "14px 16px", fontWeight: 800, fontSize: 15, cursor: weekLocked ? "default" : "pointer", flexShrink: 0, minWidth: 92, minHeight: 60 }}>
