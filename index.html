                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Next day / Save */}
            {selectedDay < 5 ? (
              <button onClick={() => setSelectedDay(d => Math.min(5, d + 1))} style={{ width: "100%", background: "#fff", color: "var(--deep-red)", border: "2px solid var(--peach)", borderRadius: 16, padding: 16, fontSize: 16, fontWeight: 800, cursor: "pointer", minHeight: 56, marginBottom: 12 }}>
                Next day · {DAY_FULL[selectedDay]} ›
              </button>
            ) : null}
            <button
              onClick={() => { if (totalSessions > 0) { showToast("Your program has been saved! 🎉"); if (DB && DB.pushBookings) DB.pushBookings(); setTimeout(() => onSaved && onSaved(), 700); } }}
              style={{ width: "100%", background: totalSessions > 0 ? "var(--gradient)" : "#ebebeb", color: totalSessions > 0 ? "#fff" : "#aaa", border: "none", borderRadius: 18, padding: "18px", fontSize: 19, cursor: totalSessions > 0 ? "pointer" : "not-allowed", boxShadow: totalSessions > 0 ? "var(--shadow-warm)" : "none", minHeight: 56, fontFamily: "'Lilita One', system-ui, sans-serif", letterSpacing: "0.02em" }}
            >
              {totalSessions > 0 ? `Save My Week ✨  (${totalSessions} session${totalSessions !== 1 ? "s" : ""})` : "Pick some activities ✨"}
            </button>
          </div>

          {/* CONFIRM MODAL (feature 01) */}
          {confirm && (
            <Modal onClose={() => setConfirm(null)}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 56, marginBottom: 8 }}>{confirm.activity.emoji}</div>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Add {confirm.activity.name}?</h2>
                <p style={{ color: "#666", fontSize: 15, margin: "0 0 22px" }}>
                  {DAY_FULL[selectedDay - 1]} · {blockRangeLabel(confirm.activity)}
                </p>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setConfirm(null)} style={{ flex: 1, background: "#f0f0f0", color: "#666", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 700, cursor: "pointer", minHeight: 56 }}>Cancel</button>
                  <button onClick={confirmAdd} style={{ flex: 1, background: "var(--deep-red)", color: "#fff", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 800, cursor: "pointer", minHeight: 56 }}>Yes, add</button>
                </div>
              </div>
            </Modal>
          )}

          {/* OVERLAP MODAL (feature 02) — hard block */}
          {conflict && (
            <Modal onClose={() => setConflict(null)}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 56, marginBottom: 8 }}>⏰</div>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Time clash!</h2>
                <p style={{ color: "#444", fontSize: 16, margin: "0 0 22px", lineHeight: 1.4 }}>
                  You're already booked for <b>{conflict.existingActivity.name}</b> at this time. You can't do both.
                </p>
                <button onClick={() => setConflict(null)} style={{ width: "100%", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 800, cursor: "pointer", minHeight: 56 }}>OK</button>
              </div>
            </Modal>
          )}

          {/* LATE CANCEL MODAL (feature 08) */}
          {cancelAsk && (
            <Modal onClose={() => setCancelAsk(null)}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 56, marginBottom: 8 }}>⚠️</div>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 8px" }}>Late cancellation</h2>
                <p style={{ color: "#444", fontSize: 16, margin: "0 0 22px", lineHeight: 1.4 }}>
                  This is classified as a late cancellation. You will be charged for this session. Please proceed.
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <button onClick={() => doRemove(cancelAsk.activity.id, cancelAsk.dateIso, true)} style={{ background: "var(--deep-red)", color: "#fff", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 800, cursor: "pointer", minHeight: 56 }}>Cancel anyway</button>
                  <button onClick={() => setCancelAsk(null)} style={{ background: "#f0f0f0", color: "#1a1a1a", border: "none", borderRadius: 14, padding: 16, fontSize: 16, fontWeight: 700, cursor: "pointer", minHeight: 56 }}>Keep booking</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ============================================================
    // LOADING / CONSENT / LOGIN
    // ============================================================
    function FullCenter({ children }) {
      return (
        <div className="lava" style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          {children}
        </div>
      );
    }

    function LoadingScreen() {
      return (
        <FullCenter>
          <div style={{ textAlign: "center", color: "#fff" }}>
            <div className="bebas" style={{ fontSize: 48, lineHeight: 0.9 }}>MOSAIC</div>
            <div style={{ marginTop: 14, fontSize: 14, opacity: 0.85 }}>Loading…</div>
          </div>
        </FullCenter>
      );
    }

    function ConsentGate({ onAgree }) {
      return (
        <FullCenter>
          <div className="route-enter" style={{ background: "#fff", borderRadius: 24, padding: 28, maxWidth: 400, width: "100%", boxShadow: "0 20px 60px rgba(26,10,0,0.35)" }}>
            <h1 className="lilita" style={{ fontSize: 28, color: "var(--dark)", margin: "0 0 12px" }}>Your privacy 💛</h1>
            <p style={{ fontSize: 15, color: "#444", lineHeight: 1.6, marginBottom: 12 }}>
              Mosaic Elite Health uses this app to help support you. We store the activities you choose
              and the things you tell us about yourself so your support team can plan around you.
            </p>
            <p style={{ fontSize: 15, color: "#444", lineHeight: 1.6, marginBottom: 20 }}>
              Only Mosaic staff who support you can see your information. We never sell it. You can ask
              us to change or delete it at any time.
            </p>
            <button onClick={onAgree} style={{ width: "100%", background: "var(--gradient)", color: "#fff", border: "none", borderRadius: 16, padding: 16, fontSize: 18, cursor: "pointer", minHeight: 56, fontFamily: "'Lilita One', system-ui, sans-serif", boxShadow: "var(--shadow-warm)" }}>
              I understand &amp; agree
            </button>
          </div>
        </FullCenter>
      );
    }

    function Login({ onLoggedIn }) {
      const live = DB && DB.ENABLED;
      const [name, setName] = useState("");
      const [pin, setPin] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");

      const submit = async () => {
        setErr(""); setBusy(true);
        try {
          await DB.auth.participantLogin(name, pin);
          onLoggedIn();
        } catch (e) {
          setErr(e.message || "Could not log in.");
        } finally { setBusy(false); }
      };

      const field = { width: "100%", padding: 16, borderRadius: 14, border: "2px solid #eee", fontSize: 16, fontFamily: "inherit", boxSizing: "border-box", marginBottom: 12 };

      return (
        <FullCenter>
          <div className="route-enter" style={{ background: "#fff", borderRadius: 24, padding: 28, maxWidth: 380, width: "100%", boxShadow: "0 20px 60px rgba(26,10,0,0.35)", textAlign: "center" }}>
            <img src="Public/mosaic-icon.png" alt="Mosaic" onError={e => { e.currentTarget.style.display = 'none'; }} style={{ width: 84, height: 84, objectFit: "contain", marginBottom: 8 }} />
            <div className="bebas" style={{ fontSize: 34, color: "var(--deep-red)", lineHeight: 0.9 }}>MOSAIC</div>
            <div className="label-cap" style={{ color: "#999", marginBottom: 16 }}>Community Hub</div>
            <h1 className="lilita" style={{ fontSize: 24, color: "var(--dark)", margin: "0 0 4px" }}>Hey there! 👋</h1>
            <p style={{ fontSize: 14, color: "#777", marginBottom: 20 }}>Type your name and PIN to get started.</p>

            <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name" autoCapitalize="words" autoCorrect="off" onKeyDown={e => { if (e.key === "Enter") submit(); }} style={field} />
            <input value={pin} onChange={e => setPin(e.target.value)} placeholder="PIN" type="password" inputMode="numeric" onKeyDown={e => { if (e.key === "Enter") submit(); }} style={field} />

            {err && <div style={{ color: "var(--deep-red)", fontSize: 14, fontWeight: 600, marginBottom: 12 }}>{err}</div>}

            <button onClick={submit} disabled={busy || !name.trim()} style={{ width: "100%", background: busy || !name.trim() ? "#ebebeb" : "var(--gradient)", color: busy || !name.trim() ? "#aaa" : "#fff", border: "none", borderRadius: 16, padding: 16, fontSize: 18, cursor: busy || !name.trim() ? "default" : "pointer", minHeight: 56, fontFamily: "'Lilita One', system-ui, sans-serif", boxShadow: busy || !name.trim() ? "none" : "var(--shadow-warm)" }}>
              {busy ? "Logging in…" : "Log in"}
            </button>

            {!live && (
              <div style={{ marginTop: 14, fontSize: 13, color: "#888", lineHeight: 1.5 }}>
                Demo mode — enter any name and PIN to explore.
              </div>
            )}

            <a href="admin.html" style={{ display: "inline-block", marginTop: 18, fontSize: 13, color: "#999", textDecoration: "none", fontWeight: 600 }}>Staff sign in →</a>
          </div>
        </FullCenter>
      );
    }

    // ============================================================
    // ONBOARDING — short first-run. Just a name; the full About Me
    // form lives in the Me tab and can be filled anytime.
    // ============================================================
    function Onboarding({ onFinish }) {
      const [name, setName] = useState(() => (loadProfile().name || sessionName() || ""));
      const save = () => {
        const prof = { ...loadProfile(), name: name.trim() };
        if (DB && DB.pushProfile) DB.pushProfile(prof); else saveProfile(prof);
        if (DB) DB.flags.giveConsent(); // consent recorded via "Let's go" + the note below
        onFinish && onFinish();
      };
      return (
        <div className="route-enter lava" style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 28px", textAlign: "center", color: "#fff" }}>
          <div style={{ width: "100%", maxWidth: 360 }}>
            <img src="Public/mosaic-icon.png" alt="Mosaic" onError={e => { e.currentTarget.style.display = 'none'; }} style={{ width: 110, height: 110, objectFit: "contain", marginBottom: 8 }} />
            <div className="bebas" style={{ fontSize: 46, lineHeight: 0.9 }}>MOSAIC</div>
            <h1 className="lilita" style={{ fontSize: 30, margin: "20px 0 8px" }}>Welcome! 👋</h1>
            <p style={{ fontSize: 16, opacity: 0.92, marginBottom: 24 }}>What should we call you?</p>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name" onKeyDown={e => { if (e.key === "Enter" && name.trim()) save(); }} style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", fontSize: 16, fontFamily: "inherit", textAlign: "center", marginBottom: 16, boxSizing: "border-box" }} />
            <button onClick={save} disabled={!name.trim()} style={{ width: "100%", background: "#fff", color: "var(--deep-red)", border: "none", borderRadius: 999, padding: "16px 24px", fontSize: 20, fontFamily: "'Lilita One', system-ui, sans-serif", cursor: name.trim() ? "pointer" : "default", opacity: name.trim() ? 1 : 0.6, boxShadow: "0 12px 32px rgba(0,0,0,0.25)", minHeight: 56 }}>Let's go 🙌</button>
            <p style={{ fontSize: 13, opacity: 0.85, marginTop: 18, lineHeight: 1.5 }}>You can tell us more about yourself anytime in the Me tab.</p>
            <p style={{ fontSize: 12, opacity: 0.75, marginTop: 10, lineHeight: 1.5 }}>🔒 We keep your info private. Only your Mosaic team can see it. By tapping Let's go you're okay with us storing it to support you.</p>
          </div>
        </div>
      );
    }

    // ============================================================
    // ROOT APP
    // ============================================================
    function hasAnyBookings() {
      const b = loadBookings();
      return Object.values(b).some(list => list.some(x => x.status === "pending" || x.status === "confirmed"));
    }

    function App() {
      const [boot, setBoot] = useState("loading"); // loading | ready
      const [session, setSessionState] = useState(() => (DB && DB.auth.session) || null);
      const [onboarded, setOnboarded] = useState(() => DB && DB.flags.onboarded());
      const [started, setStarted] = useState(() => !!localStorage.getItem(STORAGE_STARTED));
      const [scale, setScale] = useState(() => (DB ? DB.flags.scale() : 1.1));
      const [route, setRoute] = useState(() => hasAnyBookings() ? "summary" : "scheduler");

      // Apply the user's magnification to the whole app. `zoom` reflows
      // (unlike transform), so bigger UI still fits the screen width.
      useEffect(() => {
        const r = document.getElementById("root");
        if (r) r.style.zoom = String(scale);
      }, [scale]);
      const onScale = (n) => {
        const v = Math.round(Math.min(1.6, Math.max(0.9, n)) * 100) / 100;
        if (DB) DB.flags.setScale(v);
        setScale(v);
      };

      // Boot: wait for the data layer (restores Supabase session + loads activities).
      useEffect(() => {
        let alive = true;
        (async () => {
          if (DB && DB.ready) { try { await DB.ready; } catch (e) {} }
          if (DB) setSessionState(DB.auth.session);
          await initActivities();
          if (alive) setBoot("ready");
        })();
        const off = DB && DB.auth.onChange(s => alive && setSessionState(s));
        return () => { alive = false; off && off(); };
      }, []);

      const start = () => { try { localStorage.setItem(STORAGE_STARTED, "1"); } catch {} setStarted(true); };
      const onLoggedIn = () => { setSessionState(DB.auth.session); setOnboarded(DB.flags.onboarded()); setRoute(hasAnyBookings() ? "summary" : "scheduler"); };
      const finishOnboarding = () => { DB && DB.flags.markOnboarded(); DB && DB.flags.markStarted(); setOnboarded(true); setStarted(true); setRoute("scheduler"); };
      const logout = async () => { if (DB) await DB.auth.logout(); setSessionState(null); setOnboarded(false); setStarted(false); };

      if (boot === "loading") return <LoadingScreen />;
      if (!session) return <Login onLoggedIn={onLoggedIn} />;
      // First open → short welcome (name only). Full profile lives in the Me tab.
      if (!onboarded) return <Onboarding onFinish={finishOnboarding} />;
      if (!started) return <Splash onStart={start} name={session.name} />;

      const onChat = route === "sms";
      return (
        <div style={{ paddingBottom: onChat ? 0 : 80 }}>
          {route === "summary"   && <WeekSummary    onEdit={() => setRoute("scheduler")} onAway={() => setRoute("away")} />}
          {route === "scheduler" && <Scheduler      onSaved={() => setRoute("summary")} />}
          {route === "about"     && <AboutMe        onBack={() => setRoute("summary")} onLogout={logout} onAway={() => setRoute("away")} scale={scale} onScale={onScale} />}
          {route === "away"      && <AwayManager    onBack={() => setRoute("about")} />}
          {route === "service"   && <ServiceRequest onBack={() => setRoute("summary")} />}
          {route === "sms"       && <ChatScreen     onBack={() => setRoute("summary")} />}
          {!onChat && <BottomNav active={route === "away" ? "about" : route} go={setRoute} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

    // PWA: register the service worker for offline + home-screen install.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
    }
  </script>
</body>
</html>
